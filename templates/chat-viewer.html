<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务代理监控系统 - 对话历史记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7f7f8;
            color: #2d3748;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            background: linear-gradient(135deg, #0f172a, #1d4ed8);
            color: #fff;
            padding: 18px 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            flex-wrap: wrap;
        }
        .brand-title { font-size: 28px; font-weight: 700; margin: 0; }
        .brand-subtitle { color: rgba(255,255,255,.8); font-size: 13px; margin-top: 4px; }
        .nav-pills-wrap { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-pill {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 8px 14px; border-radius: 999px; text-decoration: none;
            background: rgba(255,255,255,.14); color: #fff; font-weight: 600; font-size: 13px;
            border: 1px solid rgba(255,255,255,.14);
        }
        .nav-pill.active { background: #fff; color: #0f172a; }

        /* ========= Header ========= */
        .header {
            background: #fff;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 12px;
        }
        .header h1 { font-size: 17px; font-weight: 600; color: #1a202c; white-space: nowrap; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .min-msg-label { font-size: 13px; color: #6b7280; white-space: nowrap; }
        .min-msg-input {
            width: 60px; padding: 5px 8px;
            border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 13px; text-align: center;
        }
        .btn {
            padding: 7px 14px; border: none; border-radius: 7px;
            cursor: pointer; font-size: 13px; font-weight: 500;
            transition: background .18s; white-space: nowrap;
        }
        .btn-green  { background: #10a37f; color: #fff; }
        .btn-green:hover { background: #0d8c6e; }
        .btn-indigo { background: #6366f1; color: #fff; }
        .btn-indigo:hover { background: #4f46e5; }
        .upload-wrapper { position: relative; }
        .upload-wrapper input[type="file"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .folder-select {
            padding: 5px 10px; border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 13px; background: #fff; cursor: pointer; color: #374151;
        }

        /* ========= Three-column Layout ========= */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* ========= Sidebar ========= */
        .sidebar {
            width: 270px; flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-hdr {
            padding: 10px 14px;
            font-size: 11px; font-weight: 600; color: #9ca3af;
            text-transform: uppercase; letter-spacing: .06em;
            border-bottom: 1px solid #f3f4f6;
            flex-shrink: 0;
        }
        .file-list { flex: 1; overflow-y: auto; }
        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
        .file-item {
            padding: 11px 14px; cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
            border-left: 3px solid transparent;
            transition: background .13s;
        }
        .file-item:hover { background: #f9fafb; }
        .file-item.active { background: #f0fdf4; border-left-color: #10a37f; }
        .file-item-name { font-size: 12px; color: #374151; word-break: break-all; line-height: 1.4; }
        .file-item-meta { margin-top: 3px; font-size: 11px; color: #9ca3af; }
        .sidebar-tip { padding: 20px 14px; font-size: 13px; color: #9ca3af; text-align: center; }
        .load-more-status { padding: 8px 14px; font-size: 11px; color: #9ca3af; text-align: center; border-top: 1px solid #f3f4f6; flex-shrink: 0; }

        /* ========= Chat panel ========= */
        .chat-panel { flex: 1; overflow-y: auto; padding: 24px 28px; background: #f7f7f8; }
        .chat-panel::-webkit-scrollbar { width: 6px; }
        .chat-panel::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; color: #9ca3af; gap: 12px;
        }
        .empty-state svg { width: 52px; height: 52px; opacity: .22; stroke: #9ca3af; }
        .empty-state p { font-size: 15px; }

        /* ========= Right detail panel ========= */
        .detail-panel {
            width: 300px; flex-shrink: 0;
            background: #fff;
            border-left: 1px solid #e5e7eb;
            display: flex; flex-direction: column; overflow: hidden;
            transition: width .2s;
        }
        .detail-panel.collapsed { width: 0; border-left: none; overflow: hidden; }
        .detail-header {
            padding: 12px 16px;
            font-size: 14px; font-weight: 600; color: #1a202c;
            border-bottom: 1px solid #e5e7eb;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .detail-toggle {
            background: none; border: none; cursor: pointer; font-size: 16px; color: #6b7280;
            padding: 2px 6px; border-radius: 4px;
        }
        .detail-toggle:hover { background: #f3f4f6; }
        .detail-body { flex: 1; overflow-y: auto; padding: 16px; }
        .detail-body::-webkit-scrollbar { width: 4px; }
        .detail-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
        .detail-item { padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
        .detail-item:last-child { border-bottom: none; }
        .detail-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
        .detail-value { font-size: 13px; color: #374151; word-break: break-all; }
        .detail-empty { padding: 40px 16px; text-align: center; color: #9ca3af; font-size: 13px; }

        /* ========= Metadata bar ========= */
        .metadata {
            background: #fff; border-radius: 10px;
            padding: 14px 18px; margin-bottom: 22px;
            font-size: 13px; color: #6b7280;
            border: 1px solid #e5e7eb;
        }
        .metadata-title { font-weight: 600; margin-bottom: 8px; color: #1a202c; font-size: 14px; }
        .metadata-item { display: flex; gap: 8px; padding: 3px 0; }
        .metadata-item strong { color: #374151; min-width: 100px; }

        /* ========= Message row ========= */
        .msg-row { display: flex; margin-bottom: 18px; gap: 10px; }
        .msg-row.user     { justify-content: flex-start; }
        .msg-row.assistant{ justify-content: flex-end; }
        .msg-row.user     .msg-bubble-col { align-items: flex-start; }
        .msg-row.assistant .msg-bubble-col { align-items: flex-end; }
        .msg-bubble-col { display: flex; flex-direction: column; gap: 6px; max-width: 70%; }
        .avatar {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0; margin-top: 2px;
        }
        .avatar.user      { background: linear-gradient(135deg,#667eea,#764ba2); }
        .avatar.assistant { background: linear-gradient(135deg,#10a37f,#0d8c6e); }

        /* ========= Block cards ========= */
        .block { border-radius: 10px; overflow: hidden; font-size: 14px; line-height: 1.65; word-break: break-word; }
        .block.tool-calls { background: #fff7ed; border: 1px solid #fed7aa; }
        .block.tool-role { background: #f0fdf4; border: 1px solid #bbf7d0; }
        .block-hdr.tool-role-hdr { color: #166534; }
        .badge-tool-role { background: #22c55e; color: #fff; }
        .block.text { background: #dbeafe; border: 1px solid #bfdbfe; padding: 12px 16px; white-space: pre-wrap; }
        .block.tool-use { background: #fff7ed; border: 1px solid #fed7aa; }
        .block.tool-result { background: #fff7ed; border: 1px solid #fed7aa; }
        .block.tool-result.is-error { background: #fff1f2; border-color: #fecdd3; }
        .block-hdr {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; font-size: 11px; font-weight: 600;
            border-bottom: 1px solid rgba(0,0,0,.07); color: #92400e; background: rgba(0,0,0,.03);
        }
        .block-hdr .badge { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .03em; }
        .badge-tool-use    { background: #fb923c; color: #fff; }
        .badge-tool-result { background: #f97316; color: #fff; }
        .badge-error       { background: #f43f5e; color: #fff; }
        .block-hdr .tool-name  { color: #78350f; font-weight: 700; }
        .block-hdr .tool-id    { color: #b45309; font-size: 10px; font-family: monospace; }
        .block-body { padding: 10px 14px; }
        .cmd-pre {
            background: #1e1e2e; color: #cdd6f4; border-radius: 7px; padding: 10px 14px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 12.5px; white-space: pre-wrap; word-break: break-all; margin: 4px 0 0; line-height: 1.6;
        }
        .cmd-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; font-weight: 500; }
        .result-pre {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 7px; padding: 8px 12px;
            font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px;
            white-space: pre-wrap; word-break: break-all; color: #374151; margin-top: 4px;
            line-height: 1.55; max-height: 260px; overflow-y: auto;
        }
        .result-pre.is-error { background: #fff1f2; color: #9f1239; border-color: #fecdd3; }
        .input-kv { margin-top: 4px; }
        .input-kv .kv-row { display: flex; gap: 6px; font-size: 12.5px; margin-top: 3px; }
        .input-kv .kv-key { color: #92400e; font-weight: 600; min-width: 80px; }
        .input-kv .kv-val { color: #374151; white-space: pre-wrap; word-break: break-all; }
        .error-box {
            background: #fee2e2; color: #991b1b; padding: 14px 18px; border-radius: 10px;
            border: 1px solid #fecaca; font-size: 14px; margin-bottom: 16px;
        }
        .spinner {
            display: inline-block; width: 15px; height: 15px;
            border: 2px solid #d1d5db; border-top-color: #10a37f;
            border-radius: 50%; animation: spin .6s linear infinite;
            vertical-align: middle; margin-right: 5px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="topbar">
    <div>
        <h1 class="brand-title">服务代理监控系统</h1>
        <div class="brand-subtitle">浏览 Anthropic / OpenAI 对话历史记录</div>
    </div>
    <div class="nav-pills-wrap">
        <a class="nav-pill" href="/">监控总览</a>
        <a class="nav-pill" href="/query">查询统计</a>
        <a class="nav-pill active" href="/history">对话历史记录</a>
        <a class="nav-pill" href="/failures">失败历史记录</a>
        <a class="nav-pill" href="/logout">退出登录</a>
    </div>
</div>

<div class="header">
    <h1>对话历史记录</h1>
    <div class="header-right">
        <span class="min-msg-label">文件夹</span>
        <select class="folder-select" id="folderSelect" onchange="resetAndLoad()">
            <option value="anthropic_agg">logs_anthropic（聚合）</option>
            <option value="anthropic">logs_anthropic（单文件）</option>
            <option value="openai_agg">logs_openai（聚合）</option>
            <option value="openai">logs_openai（单文件）</option>
        </select>
        <span class="min-msg-label">最少消息数</span>
        <input class="min-msg-input" type="number" id="minMessages" value="1" min="1" />
        <span class="min-msg-label">API Key</span>
        <select class="folder-select" id="filterKey" onchange="resetAndLoad()">
            <option value="">全部</option>
        </select>
        <button class="btn btn-green" onclick="resetAndLoad()">刷新列表</button>
        <div class="upload-wrapper">
            <input type="file" id="fileInput" accept=".json" />
            <label for="fileInput" class="btn btn-indigo">上传本地文件</label>
        </div>
        <span class="min-msg-label" id="loadStatus"></span>
    </div>
</div>

<div class="main">
    <!-- Left: file list -->
    <div class="sidebar">
        <div class="sidebar-hdr" id="sidebarTitle">logs_anthropic</div>
        <div class="file-list" id="fileList">
            <div class="sidebar-tip"><span class="spinner"></span>加载中…</div>
        </div>
    </div>

    <!-- Center: chat -->
    <div class="chat-panel" id="chatPanel">
        <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863
                       9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3
                       12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
            <p>从左侧选择一个对话文件</p>
        </div>
    </div>

    <!-- Right: detail panel -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <span>详情</span>
            <button class="detail-toggle" id="detailToggle" onclick="toggleDetail()" title="折叠/展开">▶</button>
        </div>
        <div class="detail-body" id="detailBody">
            <div class="detail-empty">选择一条对话查看详情</div>
        </div>
    </div>
</div>

<script>
// ----------------------------------------------------------------
// State
// ----------------------------------------------------------------
const PAGE_SIZE = 50;
const fileListEl = document.getElementById('fileList');
const chatPanel = document.getElementById('chatPanel');
const sidebarTitle = document.getElementById('sidebarTitle');
let activeItem = null;
let aggChains = [];
let offset = 0;
let totalItems = 0;
let isLoadingMore = false;
let knownKeys = new Set();

function currentFolder() {
    return document.getElementById('folderSelect').value;
}

function getKind() {
    const f = currentFolder();
    return f.startsWith('openai') ? 'openai' : 'anthropic';
}

function maskKey(key) {
    if (!key || key.length <= 8) return key || '(未知)';
    return key.slice(0, 4) + '...' + key.slice(-4);
}

function updateKeyDropdown() {
    const sel = document.getElementById('filterKey');
    const current = sel.value;
    sel.innerHTML = '<option value="">全部</option>';
    const sorted = [...knownKeys].sort();
    sorted.forEach(k => {
        const label = k ? maskKey(k) : 'default';
        const val = k || '__default__';
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = label;
        sel.appendChild(opt);
    });
    sel.value = current;
}

function collectKeys(items) {
    items.forEach(item => {
        const k = item.api_key || '';
        knownKeys.add(k);
    });
    updateKeyDropdown();
}

// ----------------------------------------------------------------
// Sidebar: file list with pagination
// ----------------------------------------------------------------
function resetAndLoad() {
    offset = 0;
    totalItems = 0;
    aggChains = [];
    knownKeys = new Set();
    fileListEl.innerHTML = '<div class="sidebar-tip"><span class="spinner"></span>加载中…</div>';
    document.getElementById('loadStatus').textContent = '';
    loadFileList();
}

async function loadFileList() {
    const min = parseInt(document.getElementById('minMessages').value) || 1;
    const folder = currentFolder();
    const params = `?min_messages=${min}&offset=${offset}&limit=${PAGE_SIZE}`;

    if (folder === 'anthropic_agg' || folder === 'openai_agg') {
        const apiFolder = folder === 'anthropic_agg' ? 'anthropic' : 'openai';
        sidebarTitle.textContent = `logs_${apiFolder} 聚合 (≥${min} 条)`;
        try {
            const res = await fetch(`/logs/${apiFolder}/aggregate${params}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const items = data.items || [];
            totalItems = data.total || items.length;

            if (offset === 0) {
                aggChains = items;
                fileListEl.innerHTML = '';
            } else {
                aggChains = aggChains.concat(items);
            }
            collectKeys(items);

            if (!aggChains.length) {
                fileListEl.innerHTML = '<div class="sidebar-tip">没有满足条件的对话</div>';
                return;
            }

            items.forEach((chain, idx) => {
                const filterKey = document.getElementById('filterKey').value;
                if (filterKey !== '') {
                    const itemKey = chain.api_key || '';
                    const matchKey = filterKey === '__default__' ? '' : filterKey;
                    if (itemKey !== matchKey) return;
                }

                const globalIdx = offset + idx;
                const el = document.createElement('div');
                el.className = 'file-item';

                let rawText = '';
                const q1 = chain.messages?.[0];
                if (q1) {
                    const c = q1.content;
                    if (typeof c === 'string') rawText = c;
                    else if (Array.isArray(c)) {
                        const tb = c.find(b => b.type === 'text');
                        rawText = tb?.text || '';
                    }
                }

                let timestamp = '';
                let taskText = rawText;
                if (chain.chain_key) {
                    const keyText = chain.chain_key.replace(/^(oq:|u:)/, '');
                    taskText = keyText;
                }
                const tsMatch = rawText.match(/\[([^\]]+GMT[^\]]*)\]\s*/);
                if (tsMatch) {
                    timestamp = tsMatch[1];
                    taskText = rawText.slice(tsMatch.index + tsMatch[0].length)
                        .replace(/^\[Subagent Context\]\s*/i, '').trim();
                }
                const preview = taskText.slice(0, 80) || rawText.slice(0, 80);

                el.innerHTML = `
                    <div class="file-item-name">${esc(preview || '(空)')}</div>
                    <div class="file-item-meta">${chain.message_count} 条 · ${chain.file_count} 个文件 · ${chain.model || '?'}</div>
                    <div class="file-item-meta" style="font-size:10px;color:#b5bec8">${esc(timestamp || chain.first_time || '')}</div>
                `;
                el.addEventListener('click', () => selectAggChain(globalIdx, el));
                fileListEl.appendChild(el);
            });
            updateLoadStatus();
            isLoadingMore = false;
        } catch(e) {
            if (offset === 0) fileListEl.innerHTML = `<div class="sidebar-tip">加载失败：${e.message}</div>`;
            isLoadingMore = false;
        }
    } else {
        const apiFolder = folder;
        sidebarTitle.textContent = `logs_${apiFolder} (≥${min} 条)`;
        try {
            const res = await fetch(`/logs/${apiFolder}/list${params}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const items = data.items || [];
            totalItems = data.total || items.length;

            if (offset === 0) fileListEl.innerHTML = '';
            collectKeys(items);

            if (!items.length && offset === 0) {
                fileListEl.innerHTML = '<div class="sidebar-tip">没有满足条件的文件</div>';
                return;
            }

            items.forEach(item => {
                const filterKey = document.getElementById('filterKey').value;
                if (filterKey !== '') {
                    const itemKey = item.api_key || '';
                    const matchKey = filterKey === '__default__' ? '' : filterKey;
                    if (itemKey !== matchKey) return;
                }

                const el = document.createElement('div');
                el.className = 'file-item';
                const ts = item.filename.replace('-req.json', '').replace(/_/g, ' ');
                el.innerHTML = `
                    <div class="file-item-name">${ts}</div>
                    <div class="file-item-meta">${item.message_count} 条 · ${item.model || '未知模型'}</div>
                `;
                el.addEventListener('click', () => selectFile(item, el, apiFolder));
                fileListEl.appendChild(el);
            });
            updateLoadStatus();
            isLoadingMore = false;
        } catch(e) {
            if (offset === 0) fileListEl.innerHTML = `<div class="sidebar-tip">加载失败：${e.message}</div>`;
            isLoadingMore = false;
        }
    }
}

function updateLoadStatus() {
    const loaded = fileListEl.querySelectorAll('.file-item').length;
    document.getElementById('loadStatus').textContent = `已加载 ${loaded} / 共 ${totalItems} 条`;
}

function loadMore() {
    const loaded = fileListEl.querySelectorAll('.file-item').length;
    if (isLoadingMore || loaded >= totalItems) return;
    isLoadingMore = true;
    offset += PAGE_SIZE;
    loadFileList();
}

// Infinite scroll
document.getElementById('fileList').addEventListener('scroll', function() {
    if (this.scrollHeight - this.scrollTop - this.clientHeight < 200) {
        loadMore();
    }
});

// ----------------------------------------------------------------
// Selection handlers
// ----------------------------------------------------------------
function selectAggChain(idx, el) {
    if (activeItem) activeItem.classList.remove('active');
    el.classList.add('active');
    activeItem = el;
    const chain = aggChains[idx];
    renderMessages(chain, `聚合链 #${chain.chain_id}  (${chain.file_count} 个文件)`);
    renderDetailPanel({
        api_key: chain.api_key || '',
        model: chain.model || '',
        message_count: chain.message_count || 0,
        first_time: chain.first_time || '',
        last_time: chain.last_time || '',
        file_count: chain.file_count || 1,
    });
}

async function selectFile(item, el, folder) {
    if (activeItem) activeItem.classList.remove('active');
    el.classList.add('active');
    activeItem = el;
    chatPanel.innerHTML = '<div class="empty-state"><span class="spinner"></span><p>加载中…</p></div>';
    try {
        const res = await fetch(`/logs/${folder}/file?filename=${encodeURIComponent(item.filename)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderMessages(data, item.filename);
        renderDetailPanel({
            api_key: item.api_key || '',
            model: data.model || item.model || '',
            message_count: (data.messages || []).length,
            filename: item.filename,
        });
    } catch(e) {
        showError(`加载失败：${e.message}`);
    }
}

// ----------------------------------------------------------------
// Detail panel
// ----------------------------------------------------------------
function renderDetailPanel(data) {
    const body = document.getElementById('detailBody');
    let html = '';
    if (data.api_key) {
        html += `<div class="detail-item"><div class="detail-label">API Key</div><div class="detail-value">${esc(maskKey(data.api_key))}</div></div>`;
    }
    if (data.model) {
        html += `<div class="detail-item"><div class="detail-label">模型</div><div class="detail-value">${esc(data.model)}</div></div>`;
    }
    html += `<div class="detail-item"><div class="detail-label">消息数</div><div class="detail-value">${data.message_count || 0}</div></div>`;
    if (data.first_time) {
        html += `<div class="detail-item"><div class="detail-label">首次时间</div><div class="detail-value">${esc(data.first_time)}</div></div>`;
    }
    if (data.last_time) {
        html += `<div class="detail-item"><div class="detail-label">最后时间</div><div class="detail-value">${esc(data.last_time)}</div></div>`;
    }
    if (data.file_count && data.file_count > 1) {
        html += `<div class="detail-item"><div class="detail-label">关联文件数</div><div class="detail-value">${data.file_count}</div></div>`;
    }
    if (data.filename) {
        html += `<div class="detail-item"><div class="detail-label">文件名</div><div class="detail-value">${esc(data.filename)}</div></div>`;
    }
    body.innerHTML = html || '<div class="detail-empty">无详情</div>';
    document.getElementById('detailPanel').classList.remove('collapsed');
}

function toggleDetail() {
    const panel = document.getElementById('detailPanel');
    const btn = document.getElementById('detailToggle');
    panel.classList.toggle('collapsed');
    btn.textContent = panel.classList.contains('collapsed') ? '◀' : '▶';
}

// ----------------------------------------------------------------
// Render messages (original style)
// ----------------------------------------------------------------
function renderMessages(data, filename) {
    chatPanel.innerHTML = '';
    const messages = data.messages ?? (Array.isArray(data) ? data : null);
    if (!messages) { showError('未找到 messages 字段'); return; }
    if (!messages.length) { showError('messages 为空'); return; }

    // Metadata bar
    const isChain = data.chain_id !== undefined;
    const showMeta = isChain || data.model || data.temperature !== undefined || data.max_tokens;
    if (showMeta) {
        const meta = document.createElement('div');
        meta.className = 'metadata';
        meta.innerHTML = `
            <div class="metadata-title">${isChain ? '聚合对话链' : '请求信息'}</div>
            ${isChain ? `<div class="metadata-item"><strong>链 ID</strong><span>#${data.chain_id}</span></div>` : ''}
            ${isChain ? `<div class="metadata-item"><strong>时间范围</strong><span>${data.first_time} → ${data.last_time}</span></div>` : ''}
            ${isChain ? `<div class="metadata-item"><strong>文件数</strong><span>${data.file_count} 个 req 文件</span></div>` : ''}
            ${data.model ? `<div class="metadata-item"><strong>模型</strong><span>${data.model}</span></div>` : ''}
            ${data.temperature !== undefined ? `<div class="metadata-item"><strong>Temperature</strong><span>${data.temperature}</span></div>` : ''}
            ${data.max_tokens ? `<div class="metadata-item"><strong>Max Tokens</strong><span>${data.max_tokens}</span></div>` : ''}
            <div class="metadata-item"><strong>消息数</strong><span>${messages.length} 条</span></div>
            <div class="metadata-item"><strong>文件</strong><span>${filename}</span></div>
        `;
        chatPanel.appendChild(meta);
    }

    messages.forEach(msg => {
        const role = msg.role || 'unknown';
        let blocks = [];

        if (role === 'tool') {
            blocks = [{ type: '_oai_tool_result', tool_call_id: msg.tool_call_id, content: msg.content }];
        } else if (msg.tool_calls && Array.isArray(msg.tool_calls)) {
            if (Array.isArray(msg.content)) {
                blocks.push(...msg.content);
            } else if (msg.content) {
                blocks.push({ type: 'text', text: msg.content });
            }
            msg.tool_calls.forEach(tc => blocks.push({ type: '_oai_tool_call', tool_call: tc }));
        } else if (Array.isArray(msg.content)) {
            blocks = msg.content;
        } else {
            blocks = [{ type: 'text', text: typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content, null, 2) }];
        }

        const displayRole = role === 'tool' ? 'user' : role;
        const row = document.createElement('div');
        row.className = `msg-row ${displayRole}`;

        const avatar = document.createElement('div');
        avatar.className = `avatar ${displayRole}`;
        avatar.textContent = displayRole === 'user' ? '👤' : displayRole === 'assistant' ? '🤖' : '⚙️';

        const col = document.createElement('div');
        col.className = 'msg-bubble-col';
        blocks.forEach(block => col.appendChild(renderBlock(block)));

        if (displayRole === 'user') {
            row.appendChild(avatar);
            row.appendChild(col);
        } else {
            row.appendChild(col);
            row.appendChild(avatar);
        }
        chatPanel.appendChild(row);
    });
}

// ----------------------------------------------------------------
// Block renderers (original style)
// ----------------------------------------------------------------
function renderBlock(block) {
    switch (block.type) {
        case 'text':            return renderTextBlock(block);
        case 'tool_use':        return renderToolUseBlock(block);
        case 'tool_result':     return renderToolResultBlock(block);
        case '_oai_tool_call':  return renderOaiToolCallBlock(block);
        case '_oai_tool_result':return renderOaiToolResultBlock(block);
        default:                return renderFallbackBlock(block);
    }
}

function renderTextBlock(block) {
    const el = document.createElement('div');
    el.className = 'block text';
    el.textContent = block.text || '';
    return el;
}

function renderToolUseBlock(block) {
    const el = document.createElement('div');
    el.className = 'block tool-use';
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `
        <span class="badge badge-tool-use">tool_use</span>
        <span class="tool-name">${esc(block.name || '')}</span>
        <span class="tool-id">${esc(block.id || '')}</span>
    `;
    el.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'block-body';
    const input = block.input || {};
    if (input.command !== undefined) {
        const lbl = document.createElement('div');
        lbl.className = 'cmd-label';
        lbl.textContent = '$ command';
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre';
        pre.textContent = input.command;
        body.appendChild(lbl);
        body.appendChild(pre);
        const others = Object.entries(input).filter(([k]) => k !== 'command');
        if (others.length) body.appendChild(renderKV(others));
    } else if (Object.keys(input).length) {
        body.appendChild(renderKV(Object.entries(input)));
    } else {
        body.textContent = '(no input)';
    }
    el.appendChild(body);
    return el;
}

function renderToolResultBlock(block) {
    const isError = block.is_error;
    const el = document.createElement('div');
    el.className = `block tool-result${isError ? ' is-error' : ''}`;
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `
        <span class="badge ${isError ? 'badge-error' : 'badge-tool-result'}">${isError ? 'error' : 'tool_result'}</span>
        <span class="tool-id">${esc(block.tool_use_id || '')}</span>
    `;
    el.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'block-body';
    const rawContent = block.content;
    const text = typeof rawContent === 'string' ? rawContent : JSON.stringify(rawContent, null, 2);
    const pre = document.createElement('pre');
    pre.className = `result-pre${isError ? ' is-error' : ''}`;
    pre.textContent = text || '(no output)';
    body.appendChild(pre);
    el.appendChild(body);
    return el;
}

function renderOaiToolCallBlock(block) {
    const tc = block.tool_call || {};
    const fn = tc.function || {};
    const el = document.createElement('div');
    el.className = 'block tool-use';
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `
        <span class="badge badge-tool-use">tool_call</span>
        <span class="tool-name">${esc(fn.name || '')}</span>
        <span class="tool-id">${esc(tc.id || '')}</span>
    `;
    el.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'block-body';
    let parsed = null;
    try { parsed = JSON.parse(fn.arguments); } catch(e) {}
    if (parsed && parsed.command !== undefined) {
        const lbl = document.createElement('div');
        lbl.className = 'cmd-label';
        lbl.textContent = '$ command';
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre';
        pre.textContent = parsed.command;
        body.appendChild(lbl);
        body.appendChild(pre);
        const others = Object.entries(parsed).filter(([k]) => k !== 'command');
        if (others.length) body.appendChild(renderKV(others));
    } else if (parsed && typeof parsed === 'object') {
        body.appendChild(renderKV(Object.entries(parsed)));
    } else {
        let args = fn.arguments || '';
        try { args = JSON.stringify(JSON.parse(args), null, 2); } catch(e) {}
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre';
        pre.textContent = args;
        body.appendChild(pre);
    }
    el.appendChild(body);
    return el;
}

function renderOaiToolResultBlock(block) {
    const el = document.createElement('div');
    el.className = 'block tool-role';
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr tool-role-hdr';
    hdr.innerHTML = `
        <span class="badge badge-tool-role">tool_result</span>
        <span class="tool-id">${esc(block.tool_call_id || '')}</span>
    `;
    el.appendChild(hdr);
    const body = document.createElement('div');
    body.className = 'block-body';
    const pre = document.createElement('pre');
    pre.className = 'result-pre';
    pre.textContent = typeof block.content === 'string' ? block.content : JSON.stringify(block.content, null, 2);
    body.appendChild(pre);
    el.appendChild(body);
    return el;
}

function renderFallbackBlock(block) {
    const el = document.createElement('div');
    el.className = 'block text';
    el.textContent = JSON.stringify(block, null, 2);
    return el;
}

// ----------------------------------------------------------------
// Helpers
// ----------------------------------------------------------------
function renderKV(entries) {
    const wrap = document.createElement('div');
    wrap.className = 'input-kv';
    entries.forEach(([k, v]) => {
        const row = document.createElement('div');
        row.className = 'kv-row';
        const keyEl = document.createElement('span');
        keyEl.className = 'kv-key';
        keyEl.textContent = k + ':';
        const valEl = document.createElement('span');
        valEl.className = 'kv-val';
        valEl.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
        row.appendChild(keyEl);
        row.appendChild(valEl);
        wrap.appendChild(row);
    });
    return wrap;
}

function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showError(msg) {
    chatPanel.innerHTML = `<div class="error-box"><strong>错误：</strong>${msg}</div>`;
}

// File upload
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const data = JSON.parse(ev.target.result);
            renderMessages(data, file.name);
            renderDetailPanel({ model: data.model || '', message_count: (data.messages || []).length, filename: file.name });
            if (activeItem) { activeItem.classList.remove('active'); activeItem = null; }
        } catch(err) { showError('JSON 解析失败：' + err.message); }
    };
    reader.readAsText(file);
    this.value = '';
});

// Init
resetAndLoad();
</script>
