<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务代理监控系统 - 对话历史记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7f7f8;
            color: #2d3748;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            background: linear-gradient(135deg, #0f172a, #1d4ed8);
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .brand-title { font-size: 18px; font-weight: 700; margin: 0; }
        .nav-pills-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-pill {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 6px 12px; border-radius: 999px; text-decoration: none;
            background: rgba(255,255,255,.14); color: #fff; font-weight: 600; font-size: 12px;
            border: 1px solid rgba(255,255,255,.14);
        }
        .nav-pill.active { background: #fff; color: #0f172a; }

        /* ========= Header ========= */
        .header {
            background: #fff;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 12px;
        }
        .header h1 { font-size: 17px; font-weight: 600; color: #1a202c; white-space: nowrap; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .min-msg-label { font-size: 13px; color: #6b7280; white-space: nowrap; }
        .min-msg-input {
            width: 60px; padding: 5px 8px;
            border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 13px; text-align: center;
        }
        .btn {
            padding: 7px 14px; border: none; border-radius: 7px;
            cursor: pointer; font-size: 13px; font-weight: 500;
            transition: background .18s; white-space: nowrap;
        }
        .btn-green  { background: #10a37f; color: #fff; }
        .btn-green:hover { background: #0d8c6e; }
        .folder-select {
            padding: 5px 10px; border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 13px; background: #fff; cursor: pointer; color: #374151;
        }

        /* ========= Three-column Layout ========= */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* ========= Sidebar ========= */
        .sidebar {
            width: 270px; flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-hdr {
            padding: 10px 14px;
            font-size: 11px; font-weight: 600; color: #9ca3af;
            text-transform: uppercase; letter-spacing: .06em;
            border-bottom: 1px solid #f3f4f6;
            flex-shrink: 0;
        }
        .file-list { flex: 1; overflow-y: auto; }
        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
        .file-item {
            padding: 11px 14px; cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
            border-left: 3px solid transparent;
            transition: background .13s;
        }
        .file-item:hover { background: #f9fafb; }
        .file-item.active { background: #f0fdf4; border-left-color: #10a37f; }
        .file-item-name { font-size: 12px; color: #374151; word-break: break-all; line-height: 1.4; }
        .file-item-meta { margin-top: 3px; font-size: 11px; color: #9ca3af; }
        .sidebar-tip { padding: 20px 14px; font-size: 13px; color: #9ca3af; text-align: center; }
        .load-more-status { padding: 8px 14px; font-size: 11px; color: #9ca3af; text-align: center; border-top: 1px solid #f3f4f6; flex-shrink: 0; }

        /* ========= Chat panel ========= */
        .chat-panel { flex: 1; overflow-y: auto; padding: 24px 28px; background: #f7f7f8; }
        .chat-panel::-webkit-scrollbar { width: 6px; }
        .chat-panel::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; color: #9ca3af; gap: 12px;
        }
        .empty-state svg { width: 52px; height: 52px; opacity: .22; stroke: #9ca3af; }
        .empty-state p { font-size: 15px; }

        /* ========= Right detail panel ========= */
        .detail-panel {
            width: 300px; flex-shrink: 0;
            background: #fff;
            border-left: 1px solid #e5e7eb;
            display: flex; flex-direction: column; overflow: hidden;
            transition: width .2s;
        }
        .detail-panel.collapsed { width: 0; border-left: none; overflow: hidden; }
        .detail-header {
            padding: 12px 16px;
            font-size: 14px; font-weight: 600; color: #1a202c;
            border-bottom: 1px solid #e5e7eb;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .detail-toggle {
            background: none; border: none; cursor: pointer; font-size: 16px; color: #6b7280;
            padding: 2px 6px; border-radius: 4px;
        }
        .detail-toggle:hover { background: #f3f4f6; }
        .detail-body { flex: 1; overflow-y: auto; padding: 16px; }
        .detail-body::-webkit-scrollbar { width: 4px; }
        .detail-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
        .detail-item { padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
        .detail-item:last-child { border-bottom: none; }
        .detail-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
        .detail-value { font-size: 13px; color: #374151; word-break: break-all; }
        .detail-empty { padding: 40px 16px; text-align: center; color: #9ca3af; font-size: 13px; }

        /* ========= Metadata bar ========= */
        .metadata {
            background: #fff; border-radius: 10px;
            padding: 14px 18px; margin-bottom: 22px;
            font-size: 13px; color: #6b7280;
            border: 1px solid #e5e7eb;
        }
        .metadata-title { font-weight: 600; margin-bottom: 8px; color: #1a202c; font-size: 14px; }
        .metadata-item { display: flex; gap: 8px; padding: 3px 0; }
        .metadata-item strong { color: #374151; min-width: 100px; }

        /* ========= Message row ========= */
        .msg-row { display: flex; margin-bottom: 18px; gap: 10px; }
        .msg-row.user     { justify-content: flex-start; }
        .msg-row.assistant{ justify-content: flex-end; }
        .msg-row.user     .msg-bubble-col { align-items: flex-start; }
        .msg-row.assistant .msg-bubble-col { align-items: flex-end; }
        .msg-bubble-col { display: flex; flex-direction: column; gap: 6px; max-width: 70%; }
        .avatar {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0; margin-top: 2px;
        }
        .avatar.user      { background: linear-gradient(135deg,#667eea,#764ba2); }
        .avatar.assistant { background: linear-gradient(135deg,#10a37f,#0d8c6e); }

        /* ========= Block cards ========= */
        .block { border-radius: 10px; overflow: hidden; font-size: 14px; line-height: 1.65; word-break: break-word; }
        .block.tool-calls { background: #fff7ed; border: 1px solid #fed7aa; }
        .block.tool-role { background: #f0fdf4; border: 1px solid #bbf7d0; }
        .block-hdr.tool-role-hdr { color: #166534; }
        .badge-tool-role { background: #22c55e; color: #fff; }
        .block.text { background: #dbeafe; border: 1px solid #bfdbfe; padding: 12px 16px; white-space: pre-wrap; }
        .block.tool-use { background: #fff7ed; border: 1px solid #fed7aa; }
        .block.tool-result { background: #fff7ed; border: 1px solid #fed7aa; }
        .block.tool-result.is-error { background: #fff1f2; border-color: #fecdd3; }
        .block-hdr {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; font-size: 11px; font-weight: 600;
            border-bottom: 1px solid rgba(0,0,0,.07); color: #92400e; background: rgba(0,0,0,.03);
        }
        .block-hdr .badge { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .03em; }
        .badge-tool-use    { background: #fb923c; color: #fff; }
        .badge-tool-result { background: #f97316; color: #fff; }
        .badge-error       { background: #f43f5e; color: #fff; }
        .block-hdr .tool-name  { color: #78350f; font-weight: 700; }
        .block-hdr .tool-id    { color: #b45309; font-size: 10px; font-family: monospace; }
        .block-body { padding: 10px 14px; }
        .cmd-pre {
            background: #1e1e2e; color: #cdd6f4; border-radius: 7px; padding: 10px 14px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 12.5px; white-space: pre-wrap; word-break: break-all; margin: 4px 0 0; line-height: 1.6;
        }
        .cmd-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; font-weight: 500; }
        .result-pre {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 7px; padding: 8px 12px;
            font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px;
            white-space: pre-wrap; word-break: break-all; color: #374151; margin-top: 4px;
            line-height: 1.55; max-height: 260px; overflow-y: auto;
        }
        .result-pre.is-error { background: #fff1f2; color: #9f1239; border-color: #fecdd3; }
        .input-kv { margin-top: 4px; }
        .input-kv .kv-row { display: flex; gap: 6px; font-size: 12.5px; margin-top: 3px; }
        .input-kv .kv-key { color: #92400e; font-weight: 600; min-width: 80px; }
        .input-kv .kv-val { color: #374151; white-space: pre-wrap; word-break: break-all; }
        .error-box {
            background: #fee2e2; color: #991b1b; padding: 14px 18px; border-radius: 10px;
            border: 1px solid #fecaca; font-size: 14px; margin-bottom: 16px;
        }
        .spinner {
            display: inline-block; width: 15px; height: 15px;
            border: 2px solid #d1d5db; border-top-color: #10a37f;
            border-radius: 50%; animation: spin .6s linear infinite;
            vertical-align: middle; margin-right: 5px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========= Search ========= */
        .search-box {
            padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 13px; width: 180px; outline: none;
        }
        .search-box:focus { border-color: #3b82f6; }
        .search-box::placeholder { color: #9ca3af; }

        /* ========= Tool mode bar ========= */
        .tool-mode-bar {
            display: flex; align-items: center; gap: 8px; margin: 0 0 12px 0; flex-wrap: wrap;
        }
        .tool-mode-bar .mode-btn {
            padding: 4px 12px; font-size: 12px; border: 1px solid #d1d5db;
            border-radius: 4px; background: #fff; cursor: pointer; color: #374151;
        }
        .tool-mode-bar .mode-btn:hover { background: #f3f4f6; }
        .tool-mode-bar .mode-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
        .tool-filter-chips {
            display: flex; flex-wrap: wrap; gap: 4px; margin: 0 0 10px 0;
        }
        .tool-filter-chip {
            padding: 2px 10px; font-size: 11px; border: 1px solid #d1d5db;
            border-radius: 12px; background: #fff; cursor: pointer; color: #374151;
            font-family: monospace;
        }
        .tool-filter-chip:hover { background: #f3f4f6; }
        .tool-filter-chip.active { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
        .tool-badge-row {
            background: #f3f4f6; color: #6b7280; border: 1px solid #d1d5db;
            border-radius: 4px; font-family: monospace; position: relative; z-index: 1;
            padding: 4px 10px; margin: 4px 0; font-size: 11px; display: flex; gap: 6px; flex-wrap: wrap;
        }
        .tool-badge-chip {
            background: #e5e7eb; padding: 1px 8px; border-radius: 10px; font-size: 11px;
        }

        /* ========= Reasoning / thinking ========= */
        .block.reasoning { background: #faf5ff; border: 1px solid #e9d5ff; border-radius: 10px; overflow: hidden; }
        .reasoning-summary {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; cursor: pointer; user-select: none;
            font-size: 13px; color: #7c3aed; font-weight: 500;
            background: rgba(0,0,0,.02);
        }
        .reasoning-summary:hover { background: rgba(124,58,237,.06); }
        .reasoning-chevron { font-size: 10px; transition: transform .15s; }
        .reasoning-chevron.collapsed { transform: rotate(-90deg); }
        .reasoning-body {
            padding: 10px 14px; font-size: 13px; color: #4c1d95;
            white-space: pre-wrap; border-top: 1px solid #e9d5ff;
            max-height: 380px; overflow-y: auto; background: #fff;
        }
        .reasoning-body.collapsed { display: none; }

        /* ========= System prompt ========= */
        .block.system-prompt { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .system-summary {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 12px; cursor: pointer; user-select: none;
            font-size: 12px; color: #475569; font-weight: 600;
            background: #f1f5f9;
        }
        .system-summary:hover { background: #e2e8f0; }
        .system-chevron { font-size: 10px; transition: transform .15s; }
        .system-chevron.collapsed { transform: rotate(-90deg); }
        .system-body {
            padding: 10px 14px; font-size: 12px; color: #334155;
            white-space: pre-wrap; border-top: 1px solid #cbd5e1;
            max-height: 300px; overflow-y: auto;
        }
        .system-body.collapsed { display: none; }

        /* ========= Scroll to bottom ========= */
        .scroll-to-bottom {
            position: absolute; bottom: 20px; right: 20px;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(15, 23, 42, 0.7); color: #fff;
            border: none; cursor: pointer; font-size: 16px;
            display: none; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
            transition: opacity .2s;
            z-index: 10;
        }
        .scroll-to-bottom:hover { background: rgba(15, 23, 42, 0.9); }
        .chat-panel { position: relative; }
    </style>
</head>
<body>

<div class="topbar">
    <h1 class="brand-title">服务代理监控系统</h1>
    <div class="nav-pills-wrap">
        <a class="nav-pill" href="/">监控总览</a>
        <a class="nav-pill" href="/query">查询统计</a>
        <a class="nav-pill active" href="/history">对话历史记录</a>
        <a class="nav-pill" href="/failures">失败历史记录</a>
        <a class="nav-pill" href="/logout">退出登录</a>
    </div>
</div>

<div class="header">
    <span class="min-msg-label" id="loadStatus" style="font-size:14px;font-weight:600;color:#1a202c;"></span>
    <div class="header-right">
        <span class="min-msg-label">文件夹</span>
        <select class="folder-select" id="folderSelect" onchange="resetAndLoad()">
            <option value="agg">聚合视图</option>
            <option value="list">单文件列表</option>
        </select>
        <span class="min-msg-label">最少消息数</span>
        <input class="min-msg-input" type="number" id="minMessages" value="1" min="1" />
        <span class="min-msg-label">API Key</span>
        <select class="folder-select" id="filterKey" onchange="reloadWithKey()">
            <option value="">全部</option>
        </select>
        <button class="btn btn-green" onclick="resetAndLoad()">刷新列表</button>
    </div>
</div>

<div class="main">
    <!-- Left: file list -->
    <div class="sidebar">
        <div class="sidebar-hdr" id="sidebarTitle">对话日志</div>
        <div style="padding:8px 10px; border-bottom:1px solid #f3f4f6;">
            <input class="search-box" type="text" id="q1Search" placeholder="搜索对话内容..." oninput="filterSidebar()" style="width:100%;" />
        </div>
        <div class="file-list" id="fileList">
            <div class="sidebar-tip"><span class="spinner"></span>加载中…</div>
        </div>
    </div>

    <!-- Center: chat -->
    <div class="chat-panel" id="chatPanel">
        <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863
                       9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3
                       12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
            <p>从左侧选择一个对话文件</p>
        </div>
        <button class="scroll-to-bottom" id="scrollToBottom" onclick="chatPanel.scrollTo({top: chatPanel.scrollHeight, behavior: 'smooth'})">&#x2193;</button>
    </div>

    <!-- Right: detail panel -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <span>详情</span>
            <button class="detail-toggle" id="detailToggle" onclick="toggleDetail()" title="折叠/展开">▶</button>
        </div>
        <div class="detail-body" id="detailBody">
            <div class="detail-empty">选择一条对话查看详情</div>
        </div>
    </div>
</div>

<script>
// ----------------------------------------------------------------
// State
// ----------------------------------------------------------------
const PAGE_SIZE = 50;
const fileListEl = document.getElementById('fileList');
const chatPanel = document.getElementById('chatPanel');
const sidebarTitle = document.getElementById('sidebarTitle');
let activeItem = null;
let aggChains = [];
let offset = 0;
let totalItems = 0;
let isLoadingMore = false;
let knownKeys = new Set();

function currentFolder() {
    return document.getElementById('folderSelect').value;
}

function isAggMode() {
    return currentFolder() === 'agg';
}

function maskKey(key) {
    if (!key || key.length <= 8) return key || '(未知)';
    return key.slice(0, 4) + '...' + key.slice(-4);
}

function updateKeyDropdown() {
    const sel = document.getElementById('filterKey');
    const current = sel.value;
    sel.innerHTML = '<option value="">全部</option>';
    const sorted = [...knownKeys].sort();
    sorted.forEach(k => {
        const label = k ? maskKey(k) : 'default';
        const val = k || '__default__';
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = label;
        sel.appendChild(opt);
    });
    sel.value = current;
}

function collectKeys(data) {
    // Prefer server-side known_keys if available
    if (data.known_keys && Array.isArray(data.known_keys)) {
        data.known_keys.forEach(k => knownKeys.add(k));
    } else {
        (data.items || []).forEach(item => {
            knownKeys.add(item.api_key || '');
        });
    }
    updateKeyDropdown();
}

// ----------------------------------------------------------------
// Sidebar: file list with pagination
// ----------------------------------------------------------------
function resetAndLoad() {
    offset = 0;
    totalItems = 0;
    aggChains = [];
    knownKeys = new Set();
    _searchQuery = '';
    document.getElementById('q1Search').value = '';
    fileListEl.innerHTML = '<div class="sidebar-tip"><span class="spinner"></span>加载中…</div>';
    document.getElementById('loadStatus').textContent = '';
    loadFileList(true);
}

function reloadWithKey() {
    offset = 0;
    totalItems = 0;
    aggChains = [];
    _searchQuery = '';
    document.getElementById('q1Search').value = '';
    fileListEl.innerHTML = '<div class="sidebar-tip"><span class="spinner"></span>加载中…</div>';
    document.getElementById('loadStatus').textContent = '';
    loadFileList();
}

async function loadFileList(refresh = false) {
    const min = parseInt(document.getElementById('minMessages').value) || 1;
    const folder = currentFolder();
    const filterKey = document.getElementById('filterKey').value;
    const resolvedKey = filterKey === '__default__' ? '' : filterKey;
    let params = `?min_messages=${min}&offset=${offset}&limit=${PAGE_SIZE}`;
    if (filterKey) params += `&api_key=${encodeURIComponent(resolvedKey)}`;
    if (refresh) params += '&refresh=true';

    if (folder === 'anthropic_agg' || folder === 'openai_agg' || folder === 'agg') {
        sidebarTitle.textContent = `对话聚合 (≥${min} 条)`;
        try {
            const res = await fetch(`/logs/aggregate${params}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const items = data.items || [];
            totalItems = data.total || items.length;

            if (offset === 0) {
                aggChains = items;
                fileListEl.innerHTML = '';
            } else {
                aggChains = aggChains.concat(items);
            }
            collectKeys(data);

            if (!aggChains.length) {
                fileListEl.innerHTML = '<div class="sidebar-tip">没有满足条件的对话</div>';
                return;
            }

            items.forEach((chain, idx) => {
                const globalIdx = offset + idx;
                const el = document.createElement('div');
                el.className = 'file-item';

                let rawText = '';
                const q1 = chain.messages?.[0];
                if (q1) {
                    const c = q1.content;
                    if (typeof c === 'string') rawText = c;
                    else if (Array.isArray(c)) {
                        const tb = c.find(b => b.type === 'text');
                        rawText = tb?.text || '';
                    }
                }

                let timestamp = '';
                let taskText = chain.q1_preview || rawText;
                if (!chain.q1_preview && chain.chain_key) {
                    taskText = chain.chain_key;
                }
                const tsMatch = rawText.match(/\[([^\]]+GMT[^\]]*)\]\s*/);
                if (tsMatch) {
                    timestamp = tsMatch[1];
                    taskText = rawText.slice(tsMatch.index + tsMatch[0].length)
                        .replace(/^\[Subagent Context\]\s*/i, '').trim();
                }
                const preview = taskText.slice(0, 80) || rawText.slice(0, 80);

                el.innerHTML = `
                    <div class="file-item-name">${esc(preview || '(空)')}</div>
                    <div class="file-item-meta">${chain.message_count} 条 · ${chain.file_count} 个文件 · ${(chain.models || [chain.model]).filter(Boolean).join(', ') || '?'}</div>
                    <div class="file-item-meta" style="font-size:10px;color:#b5bec8">${esc(timestamp || chain.first_time || '')}</div>
                `;
                el.addEventListener('click', () => selectAggChain(globalIdx, el));
                fileListEl.appendChild(el);
            });
            updateLoadStatus();
            isLoadingMore = false;
        } catch(e) {
            if (offset === 0) fileListEl.innerHTML = `<div class="sidebar-tip">加载失败：${e.message}</div>`;
            isLoadingMore = false;
        }
    } else {
        sidebarTitle.textContent = `单文件列表 (≥${min} 条)`;
        try {
            const res = await fetch(`/logs/list${params}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const items = data.items || [];
            totalItems = data.total || items.length;

            if (offset === 0) fileListEl.innerHTML = '';
            collectKeys(data);

            if (!items.length && offset === 0) {
                fileListEl.innerHTML = '<div class="sidebar-tip">没有满足条件的文件</div>';
                return;
            }

            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'file-item';
                const ts = item.filename.replace('-req.json', '').replace(/_/g, ' ');
                el.innerHTML = `
                    <div class="file-item-name">${ts}</div>
                    <div class="file-item-meta">${item.message_count} 条 · ${item.model || '未知模型'}</div>
                `;
                el.addEventListener('click', () => selectFile(item, el));
                fileListEl.appendChild(el);
            });
            updateLoadStatus();
            isLoadingMore = false;
        } catch(e) {
            if (offset === 0) fileListEl.innerHTML = `<div class="sidebar-tip">加载失败：${e.message}</div>`;
            isLoadingMore = false;
        }
    }
}

function updateLoadStatus() {
    const loaded = fileListEl.querySelectorAll('.file-item').length;
    document.getElementById('loadStatus').textContent = `已加载 ${loaded} / 共 ${totalItems} 条`;
}

function loadMore() {
    if (_searchQuery) return;
    const loaded = fileListEl.querySelectorAll('.file-item').length;
    if (isLoadingMore || loaded >= totalItems) return;
    isLoadingMore = true;
    offset += PAGE_SIZE;
    loadFileList();
}

// Infinite scroll
document.getElementById('fileList').addEventListener('scroll', function() {
    if (this.scrollHeight - this.scrollTop - this.clientHeight < 200) {
        loadMore();
    }
});

// ----------------------------------------------------------------
// Selection handlers
// ----------------------------------------------------------------
async function selectAggChain(idx, el) {
    if (activeItem) activeItem.classList.remove('active');
    el.classList.add('active');
    activeItem = el;
    const chain = aggChains[idx];

    chatPanel.innerHTML = '<div class="empty-state"><span class="spinner"></span><p>加载中…</p></div>';
    renderDetailPanel({
        api_key: chain.api_key || '',
        models: chain.models || (chain.model ? [chain.model] : []),
        message_count: chain.message_count || 0,
        first_time: chain.first_time || '',
        last_time: chain.last_time || '',
        file_count: chain.file_count || 1,
    });

    if (chain.latest_file) {
        try {
            const res = await fetch(`/logs/file?filename=${encodeURIComponent(chain.latest_file)}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderMessages(data, `${chain.q1_preview || chain.latest_file}  (${chain.file_count} 个文件)`);
        } catch(e) {
            showError(`加载失败：${e.message}`);
        }
    } else {
        chatPanel.innerHTML = '<div class="empty-state"><p>无可用文件</p></div>';
    }
}

async function selectFile(item, el) {
    if (activeItem) activeItem.classList.remove('active');
    el.classList.add('active');
    activeItem = el;
    chatPanel.innerHTML = '<div class="empty-state"><span class="spinner"></span><p>加载中…</p></div>';
    try {
        const res = await fetch(`/logs/file?filename=${encodeURIComponent(item.filename)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderMessages(data, item.filename);
        renderDetailPanel({
            api_key: item.api_key || '',
            models: [data.model || item.model].filter(Boolean),
            message_count: (data.messages || []).length,
            filename: item.filename,
        });
    } catch(e) {
        showError(`加载失败：${e.message}`);
    }
}

// ----------------------------------------------------------------
// Detail panel
// ----------------------------------------------------------------
function renderDetailPanel(data) {
    const body = document.getElementById('detailBody');
    let html = '';
    if (data.api_key) {
        html += `<div class="detail-item"><div class="detail-label">API Key</div><div class="detail-value">${esc(maskKey(data.api_key))}</div></div>`;
    }
    if (data.models && data.models.length) {
        html += `<div class="detail-item"><div class="detail-label">模型</div><div class="detail-value">${data.models.map(esc).join(', ')}</div></div>`;
    }
    html += `<div class="detail-item"><div class="detail-label">消息数</div><div class="detail-value">${data.message_count || 0}</div></div>`;
    if (data.first_time) {
        html += `<div class="detail-item"><div class="detail-label">首次时间</div><div class="detail-value">${esc(data.first_time)}</div></div>`;
    }
    if (data.last_time) {
        html += `<div class="detail-item"><div class="detail-label">最后时间</div><div class="detail-value">${esc(data.last_time)}</div></div>`;
    }
    if (data.file_count && data.file_count > 1) {
        html += `<div class="detail-item"><div class="detail-label">关联文件数</div><div class="detail-value">${data.file_count}</div></div>`;
    }
    if (data.filename) {
        html += `<div class="detail-item"><div class="detail-label">文件名</div><div class="detail-value">${esc(data.filename)}</div></div>`;
    }
    body.innerHTML = html || '<div class="detail-empty">无详情</div>';
    document.getElementById('detailPanel').classList.remove('collapsed');
}

function toggleDetail() {
    const panel = document.getElementById('detailPanel');
    const btn = document.getElementById('detailToggle');
    panel.classList.toggle('collapsed');
    btn.textContent = panel.classList.contains('collapsed') ? '◀' : '▶';
}

// ----------------------------------------------------------------
// Render messages (enhanced: tool modes, thinking, system collapse)
// ----------------------------------------------------------------
let _toolMode = 0;
let _activeToolFilters = new Set();

function renderMessages(data, filename) {
    chatPanel.innerHTML = '';
    const messages = data.messages ?? (Array.isArray(data) ? data : null);
    if (!messages) { showError('未找到 messages 字段'); return; }
    if (!messages.length) { showError('messages 为空'); return; }

    // Metadata bar
    const isChain = data.chain_id !== undefined;
    const showMeta = isChain || data.model || data.models || data.temperature !== undefined || data.max_tokens;
    if (showMeta) {
        const modelDisplay = data.models ? data.models.join(', ') : (data.model || '');
        const meta = document.createElement('div');
        meta.className = 'metadata';
        meta.innerHTML = `
            <div class="metadata-title">${isChain ? '聚合对话链' : '请求信息'}</div>
            ${isChain ? `<div class="metadata-item"><strong>链 ID</strong><span>#${data.chain_id}</span></div>` : ''}
            ${isChain ? `<div class="metadata-item"><strong>时间范围</strong><span>${data.first_time} → ${data.last_time}</span></div>` : ''}
            ${isChain ? `<div class="metadata-item"><strong>文件数</strong><span>${data.file_count} 个 req 文件</span></div>` : ''}
            ${modelDisplay ? `<div class="metadata-item"><strong>模型</strong><span>${modelDisplay}</span></div>` : ''}
            ${data.temperature !== undefined ? `<div class="metadata-item"><strong>Temperature</strong><span>${data.temperature}</span></div>` : ''}
            ${data.max_tokens ? `<div class="metadata-item"><strong>Max Tokens</strong><span>${data.max_tokens}</span></div>` : ''}
            <div class="metadata-item"><strong>消息数</strong><span>${messages.length} 条</span></div>
            <div class="metadata-item"><strong>文件</strong><span>${filename}</span></div>
        `;
        chatPanel.appendChild(meta);
    }

    // Tool mode bar
    _toolMode = 0;
    _activeToolFilters = new Set();
    const modeBar = document.createElement('div');
    modeBar.className = 'tool-mode-bar';
    const modeLabels = ['全部显示', '按工具筛选', '简化显示'];
    const modeBtns = modeLabels.map((label, i) => {
        const btn = document.createElement('button');
        btn.className = 'mode-btn' + (i === 0 ? ' active' : '');
        btn.textContent = label;
        btn.addEventListener('click', () => {
            _toolMode = i;
            modeBtns.forEach((b, j) => b.classList.toggle('active', j === i));
            filterChipsContainer.style.display = i === 1 ? '' : 'none';
            applyToolMode();
        });
        modeBar.appendChild(btn);
        return btn;
    });
    chatPanel.appendChild(modeBar);

    const filterChipsContainer = document.createElement('div');
    filterChipsContainer.className = 'tool-filter-chips';
    filterChipsContainer.style.display = 'none';
    chatPanel.appendChild(filterChipsContainer);

    // Render messages
    messages.forEach(msg => {
        const role = msg.role || 'unknown';

        // System prompt: collapsible
        if (role === 'system') {
            chatPanel.appendChild(renderSystemPrompt(msg.content));
            return;
        }

        let blocks = [];
        let isToolRow = false;
        let toolRowType = '';

        if (role === 'tool') {
            blocks = [{ type: '_oai_tool_result', tool_call_id: msg.tool_call_id, content: msg.content }];
            isToolRow = true;
            toolRowType = 'result';
        } else if (msg.tool_calls && Array.isArray(msg.tool_calls)) {
            if (Array.isArray(msg.content)) {
                blocks.push(...msg.content);
            } else if (msg.content) {
                blocks.push({ type: 'text', text: msg.content });
            }
            msg.tool_calls.forEach(tc => blocks.push({ type: '_oai_tool_call', tool_call: tc }));
            isToolRow = true;
            toolRowType = 'use';
        } else if (Array.isArray(msg.content)) {
            blocks = msg.content;
            const hasUse = blocks.some(b => b.type === 'tool_use' || b.type === '_oai_tool_call');
            const hasResult = blocks.some(b => b.type === 'tool_result' || b.type === '_oai_tool_result');
            if (hasUse || hasResult) {
                isToolRow = true;
                toolRowType = hasUse ? 'use' : 'result';
            }
        } else {
            blocks = [{ type: 'text', text: typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content, null, 2) }];
        }

        // OpenAI reasoning_content
        if (msg.reasoning_content) {
            blocks = [{ type: 'thinking', thinking: msg.reasoning_content }, ...blocks];
        }

        const displayRole = role === 'tool' ? 'user' : role;

        // Split: text/thinking vs tool blocks
        const textBlocks = [];
        const toolBlocks = [];
        if (isToolRow && toolRowType === 'use') {
            for (const b of blocks) {
                const bt = b.type || '';
                if (bt === 'tool_use' || bt === '_oai_tool_call') {
                    toolBlocks.push(b);
                } else {
                    textBlocks.push(b);
                }
            }
        }

        // Render text/thinking part separately (not affected by tool mode)
        if (textBlocks.length > 0) {
            const textRow = document.createElement('div');
            textRow.className = `msg-row ${displayRole}`;
            const avatar1 = document.createElement('div');
            avatar1.className = `avatar ${displayRole}`;
            avatar1.textContent = displayRole === 'user' ? '👤' : '🤖';
            const col1 = document.createElement('div');
            col1.className = 'msg-bubble-col';
            if (msg._from_res) {
                const tag = document.createElement('div');
                tag.style.cssText = 'font-size:10px;color:#6366f1;font-weight:600;margin-bottom:4px;';
                tag.textContent = '↓ 来自 res 文件的回复';
                col1.appendChild(tag);
            }
            textBlocks.forEach(b => { const el = renderBlock(b); if (el) col1.appendChild(el); });
            if (displayRole === 'user') {
                textRow.appendChild(avatar1); textRow.appendChild(col1);
            } else {
                textRow.appendChild(col1); textRow.appendChild(avatar1);
            }
            chatPanel.appendChild(textRow);
        }

        // Render tool/main row
        const row = document.createElement('div');
        row.className = `msg-row ${displayRole}`;
        if (isToolRow) {
            row.classList.add('tool-row');
            if (toolRowType === 'use') row.classList.add('tool-use-row');
            if (toolRowType === 'result') row.classList.add('tool-result-row');
            // Collect tool names for filtering
            const names = [];
            const renderBlocks = toolBlocks.length > 0 ? toolBlocks : blocks;
            renderBlocks.forEach(b => {
                if (b.type === 'tool_use') names.push(b.name || 'unknown');
                else if (b.type === '_oai_tool_call') names.push(b.tool_call?.function?.name || 'unknown');
                else if (b.type === 'tool_result' || b.type === '_oai_tool_result') names.push('tool_result');
            });
            row.dataset.toolNames = names.join(',');
        }

        // Skip rendering main row if text was already rendered separately
        if (textBlocks.length > 0 && toolBlocks.length > 0) {
            // Only render tool blocks
            const avatar = document.createElement('div');
            avatar.className = `avatar ${displayRole}`;
            avatar.textContent = '🤖';
            const col = document.createElement('div');
            col.className = 'msg-bubble-col';
            toolBlocks.forEach(b => { const el = renderBlock(b); if (el) col.appendChild(el); });
            row.appendChild(col); row.appendChild(avatar);
            chatPanel.appendChild(row);
        } else if (textBlocks.length === 0) {
            // Normal render (no split needed)
            const avatar = document.createElement('div');
            avatar.className = `avatar ${displayRole}`;
            avatar.textContent = displayRole === 'user' ? '👤' : displayRole === 'assistant' ? '🤖' : '⚙️';
            const col = document.createElement('div');
            col.className = 'msg-bubble-col';
            if (msg._from_res && !isToolRow) {
                const tag = document.createElement('div');
                tag.style.cssText = 'font-size:10px;color:#6366f1;font-weight:600;margin-bottom:4px;';
                tag.textContent = '↓ 来自 res 文件的回复';
                col.appendChild(tag);
            }
            blocks.forEach(b => { const el = renderBlock(b); if (el) col.appendChild(el); });
            if (displayRole === 'user') {
                row.appendChild(avatar); row.appendChild(col);
            } else {
                row.appendChild(col); row.appendChild(avatar);
            }
            chatPanel.appendChild(row);
        }
    });

    // Build filter chips and apply initial mode
    buildFilterChips(filterChipsContainer);
    applyToolMode();

    // Re-add scroll-to-bottom button
    chatPanel.appendChild(document.getElementById('scrollToBottom') || createScrollBtn());
}

function createScrollBtn() {
    const btn = document.createElement('button');
    btn.className = 'scroll-to-bottom';
    btn.id = 'scrollToBottom';
    btn.innerHTML = '&#x2193;';
    btn.onclick = () => chatPanel.scrollTo({top: chatPanel.scrollHeight, behavior: 'smooth'});
    return btn;
}

// ----------------------------------------------------------------
// Tool mode logic
// ----------------------------------------------------------------
function collectToolNames() {
    const names = new Set();
    chatPanel.querySelectorAll('.tool-row').forEach(el => {
        (el.dataset.toolNames || '').split(',').filter(Boolean).forEach(n => {
            if (n !== 'tool_result' && n !== 'tool') names.add(n);
        });
    });
    return [...names].sort();
}

function buildFilterChips(container) {
    container.innerHTML = '';
    const allNames = collectToolNames();
    _activeToolFilters = new Set(allNames);
    allNames.forEach(name => {
        const chip = document.createElement('span');
        chip.className = 'tool-filter-chip active';
        chip.textContent = name;
        chip.addEventListener('click', () => {
            if (_activeToolFilters.has(name)) {
                _activeToolFilters.delete(name);
                chip.classList.remove('active');
            } else {
                _activeToolFilters.add(name);
                chip.classList.add('active');
            }
            applyToolMode();
        });
        container.appendChild(chip);
    });
}

function applyToolMode() {
    chatPanel.querySelectorAll('.tool-badge-row').forEach(el => el.remove());

    if (_toolMode === 0) {
        chatPanel.querySelectorAll('.tool-row').forEach(el => el.style.display = '');
        return;
    }
    if (_toolMode === 1) {
        chatPanel.querySelectorAll('.tool-row').forEach(el => {
            const names = (el.dataset.toolNames || '').split(',').filter(Boolean);
            const match = names.some(n => _activeToolFilters.has(n));
            el.style.display = match ? '' : 'none';
        });
        return;
    }
    // Mode 2: simplified — hide tool rows, show summary badges
    const toolRows = chatPanel.querySelectorAll('.tool-row');
    toolRows.forEach(el => el.style.display = 'none');

    const children = [...chatPanel.children];
    let i = 0;
    while (i < children.length) {
        const el = children[i];
        if (!el.classList || !el.classList.contains('tool-row')) { i++; continue; }
        const counts = {};
        let lastToolEl = el;
        while (i < children.length && children[i].classList && children[i].classList.contains('tool-row')) {
            const names = (children[i].dataset.toolNames || '').split(',').filter(Boolean);
            names.forEach(n => { counts[n] = (counts[n] || 0) + 1; });
            lastToolEl = children[i];
            i++;
        }
        const parts = Object.entries(counts)
            .filter(([n]) => n !== 'tool' && n !== 'tool_result')
            .map(([n, c]) => `<span class="tool-badge-chip">${esc(n)}${c > 1 ? ' x' + c : ''}</span>`);
        if (!parts.length) continue;
        const badge = document.createElement('div');
        badge.className = 'tool-badge-row';
        badge.innerHTML = parts.join('');
        lastToolEl.after(badge);
    }
}

// ----------------------------------------------------------------
// System prompt (collapsible)
// ----------------------------------------------------------------
function renderSystemPrompt(content) {
    const text = typeof content === 'string' ? content
        : Array.isArray(content) ? content.map(b => b.text || '').join('\n')
        : JSON.stringify(content, null, 2);
    const el = document.createElement('div');
    el.className = 'block system-prompt';
    const charCount = text.length;
    el.innerHTML = `
        <div class="system-summary" onclick="this.nextElementSibling.classList.toggle('collapsed'); this.querySelector('.system-chevron').classList.toggle('collapsed')">
            <span class="system-chevron collapsed">&#9660;</span>
            <span>System Prompt (${charCount} 字)</span>
        </div>
        <div class="system-body collapsed">${esc(text)}</div>
    `;
    return el;
}

// ----------------------------------------------------------------
// Reasoning / thinking (collapsible)
// ----------------------------------------------------------------
function renderReasoningBlock(text) {
    const el = document.createElement('div');
    el.className = 'block reasoning';
    const charCount = (text || '').length;
    el.innerHTML = `
        <div class="reasoning-summary" onclick="this.nextElementSibling.classList.toggle('collapsed'); this.querySelector('.reasoning-chevron').classList.toggle('collapsed')">
            <span class="reasoning-chevron collapsed">&#9660;</span>
            <span>思考过程 (${charCount} 字)</span>
        </div>
        <div class="reasoning-body collapsed">${esc(text || '')}</div>
    `;
    return el;
}

// ----------------------------------------------------------------
// Block renderers
// ----------------------------------------------------------------
function renderBlock(block) {
    switch (block.type) {
        case 'text':            return renderTextBlock(block);
        case 'thinking':        return renderReasoningBlock(block.thinking);
        case 'tool_use':        return renderToolUseBlock(block);
        case 'tool_result':     return renderToolResultBlock(block);
        case '_oai_tool_call':  return renderOaiToolCallBlock(block);
        case '_oai_tool_result':return renderOaiToolResultBlock(block);
        default:                return renderFallbackBlock(block);
    }
}

function renderTextBlock(block) {
    const el = document.createElement('div');
    el.className = 'block text';
    el.textContent = block.text || '';
    return el;
}

function renderToolUseBlock(block) {
    const el = document.createElement('div');
    el.className = 'block tool-use';
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `
        <span class="badge badge-tool-use">tool_use</span>
        <span class="tool-name">${esc(block.name || '')}</span>
        <span class="tool-id">${esc(block.id || '')}</span>
    `;
    el.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'block-body';
    const input = block.input || {};
    if (input.command !== undefined) {
        const lbl = document.createElement('div');
        lbl.className = 'cmd-label';
        lbl.textContent = '$ command';
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre';
        pre.textContent = input.command;
        body.appendChild(lbl);
        body.appendChild(pre);
        const others = Object.entries(input).filter(([k]) => k !== 'command');
        if (others.length) body.appendChild(renderKV(others));
    } else if (Object.keys(input).length) {
        body.appendChild(renderKV(Object.entries(input)));
    } else {
        body.textContent = '(no input)';
    }
    el.appendChild(body);
    return el;
}

function renderToolResultBlock(block) {
    const isError = block.is_error;
    const el = document.createElement('div');
    el.className = `block tool-result${isError ? ' is-error' : ''}`;
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `
        <span class="badge ${isError ? 'badge-error' : 'badge-tool-result'}">${isError ? 'error' : 'tool_result'}</span>
        <span class="tool-id">${esc(block.tool_use_id || '')}</span>
    `;
    el.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'block-body';
    const rawContent = block.content;
    const text = typeof rawContent === 'string' ? rawContent : JSON.stringify(rawContent, null, 2);
    const pre = document.createElement('pre');
    pre.className = `result-pre${isError ? ' is-error' : ''}`;
    pre.textContent = text || '(no output)';
    body.appendChild(pre);
    el.appendChild(body);
    return el;
}

function renderOaiToolCallBlock(block) {
    const tc = block.tool_call || {};
    const fn = tc.function || {};
    const el = document.createElement('div');
    el.className = 'block tool-use';
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `
        <span class="badge badge-tool-use">tool_call</span>
        <span class="tool-name">${esc(fn.name || '')}</span>
        <span class="tool-id">${esc(tc.id || '')}</span>
    `;
    el.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'block-body';
    let parsed = null;
    try { parsed = JSON.parse(fn.arguments); } catch(e) {}
    if (parsed && parsed.command !== undefined) {
        const lbl = document.createElement('div');
        lbl.className = 'cmd-label';
        lbl.textContent = '$ command';
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre';
        pre.textContent = parsed.command;
        body.appendChild(lbl);
        body.appendChild(pre);
        const others = Object.entries(parsed).filter(([k]) => k !== 'command');
        if (others.length) body.appendChild(renderKV(others));
    } else if (parsed && typeof parsed === 'object') {
        body.appendChild(renderKV(Object.entries(parsed)));
    } else {
        let args = fn.arguments || '';
        try { args = JSON.stringify(JSON.parse(args), null, 2); } catch(e) {}
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre';
        pre.textContent = args;
        body.appendChild(pre);
    }
    el.appendChild(body);
    return el;
}

function renderOaiToolResultBlock(block) {
    const el = document.createElement('div');
    el.className = 'block tool-role';
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr tool-role-hdr';
    hdr.innerHTML = `
        <span class="badge badge-tool-role">tool_result</span>
        <span class="tool-id">${esc(block.tool_call_id || '')}</span>
    `;
    el.appendChild(hdr);
    const body = document.createElement('div');
    body.className = 'block-body';
    const pre = document.createElement('pre');
    pre.className = 'result-pre';
    pre.textContent = typeof block.content === 'string' ? block.content : JSON.stringify(block.content, null, 2);
    body.appendChild(pre);
    el.appendChild(body);
    return el;
}

function renderFallbackBlock(block) {
    const el = document.createElement('div');
    el.className = 'block text';
    el.textContent = JSON.stringify(block, null, 2);
    return el;
}

// ----------------------------------------------------------------
// Helpers
// ----------------------------------------------------------------
function renderKV(entries) {
    const wrap = document.createElement('div');
    wrap.className = 'input-kv';
    entries.forEach(([k, v]) => {
        const row = document.createElement('div');
        row.className = 'kv-row';
        const keyEl = document.createElement('span');
        keyEl.className = 'kv-key';
        keyEl.textContent = k + ':';
        const valEl = document.createElement('span');
        valEl.className = 'kv-val';
        valEl.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
        row.appendChild(keyEl);
        row.appendChild(valEl);
        wrap.appendChild(row);
    });
    return wrap;
}

function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showError(msg) {
    chatPanel.innerHTML = `<div class="error-box"><strong>错误：</strong>${msg}</div>`;
}

// ----------------------------------------------------------------
// Q1 search filter
// ----------------------------------------------------------------
let _searchQuery = '';
function filterSidebar() {
    _searchQuery = (document.getElementById('q1Search').value || '').trim().toLowerCase();
    const items = fileListEl.querySelectorAll('.file-item');
    let visible = 0;
    items.forEach(el => {
        if (!_searchQuery) {
            el.style.display = '';
            visible++;
            return;
        }
        const name = (el.querySelector('.file-item-name')?.textContent || '').toLowerCase();
        const match = name.includes(_searchQuery);
        el.style.display = match ? '' : 'none';
        if (match) visible++;
    });
    document.getElementById('loadStatus').textContent = _searchQuery
        ? `搜索到 ${visible} 条 (共 ${totalItems})`
        : `已加载 ${items.length} / 共 ${totalItems} 条`;
}

// ----------------------------------------------------------------
// Scroll-to-bottom visibility
// ----------------------------------------------------------------
(function() {
    const panel = document.getElementById('chatPanel');
    const btn = document.getElementById('scrollToBottom');
    panel.addEventListener('scroll', () => {
        const nearBottom = panel.scrollHeight - panel.scrollTop - panel.clientHeight < 200;
        btn.style.display = nearBottom ? 'none' : 'flex';
    });
})();

// Init
resetAndLoad();
</script>
</body>
</html>
