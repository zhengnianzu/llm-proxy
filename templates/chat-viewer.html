<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f7f7f8;
            color: #2d3748;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---- Header ---- */
        .header {
            background: #ffffff;
            padding: 14px 20px;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0,0,0,.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header h1 { font-size: 18px; font-weight: 600; color: #1a202c; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .min-msg-label { font-size: 13px; color: #6b7280; }

        .min-msg-input {
            width: 64px;
            padding: 6px 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
        }

        .refresh-btn {
            padding: 8px 16px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background .2s;
        }
        .refresh-btn:hover { background: #0d8c6e; }

        /* upload fallback */
        .upload-wrapper { position: relative; }
        .upload-wrapper input[type="file"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .upload-label {
            display: inline-block;
            padding: 8px 16px;
            background: #6366f1;
            color: white;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background .2s;
        }
        .upload-label:hover { background: #4f46e5; }

        /* ---- Main body ---- */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px 14px;
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: .05em;
            border-bottom: 1px solid #f3f4f6;
            flex-shrink: 0;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
        }

        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        .file-item {
            padding: 12px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
            transition: background .15s;
        }

        .file-item:hover { background: #f9fafb; }
        .file-item.active { background: #f0fdf4; border-left: 3px solid #10a37f; }

        .file-item-name {
            font-size: 12px;
            color: #374151;
            word-break: break-all;
            line-height: 1.4;
        }

        .file-item-meta {
            margin-top: 4px;
            font-size: 11px;
            color: #9ca3af;
        }

        .sidebar-empty {
            padding: 24px 14px;
            font-size: 13px;
            color: #9ca3af;
            text-align: center;
        }

        /* ---- Chat panel ---- */
        .chat-panel {
            flex: 1;
            overflow-y: auto;
            padding: 28px 20px;
            background: #f7f7f8;
        }

        .chat-panel::-webkit-scrollbar { width: 6px; }
        .chat-panel::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

        /* empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
            gap: 12px;
        }

        .empty-state svg { width: 56px; height: 56px; opacity: .25; stroke: #9ca3af; }
        .empty-state p { font-size: 15px; }

        /* metadata */
        .metadata {
            background: #ffffff;
            border-radius: 10px;
            padding: 16px 18px;
            margin: 0 auto 24px;
            max-width: 1100px;
            font-size: 13px;
            color: #6b7280;
            border: 1px solid #e5e7eb;
        }

        .metadata-title { font-weight: 600; margin-bottom: 10px; color: #1a202c; font-size: 14px; }

        .metadata-item { padding: 4px 0; display: flex; gap: 8px; }
        .metadata-item strong { color: #374151; min-width: 110px; }

        /* messages */
        .message-wrapper {
            display: flex;
            margin-bottom: 20px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .message-wrapper.user { justify-content: flex-start; }
        .message-wrapper.assistant { justify-content: flex-end; }

        .message { display: flex; gap: 10px; max-width: 72%; }
        .message.user { flex-direction: row; }
        .message.assistant { flex-direction: row-reverse; }

        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }

        .avatar.user { background: linear-gradient(135deg,#667eea,#764ba2); color: white; }
        .avatar.assistant { background: linear-gradient(135deg,#10a37f,#0d8c6e); color: white; }

        .message-content {
            padding: 14px 18px;
            border-radius: 14px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.user .message-content {
            background: #ffffff;
            color: #1a202c;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0,0,0,.04);
        }

        .message.assistant .message-content {
            background: #f0fdf4;
            color: #1a202c;
            border: 1px solid #d1fae5;
        }

        .error-box {
            background: #fee2e2;
            color: #991b1b;
            padding: 14px 18px;
            margin: 0 auto 20px;
            border-radius: 10px;
            max-width: 1100px;
            border: 1px solid #fecaca;
            font-size: 14px;
        }

        /* loading spinner */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid #d1d5db;
            border-top-color: #10a37f;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h1>💬 Chat Viewer</h1>
    <div class="header-right">
        <span class="min-msg-label">最少消息数</span>
        <input class="min-msg-input" type="number" id="minMessages" value="10" min="1" />
        <button class="refresh-btn" onclick="loadFileList()">刷新列表</button>
        <!-- 本地文件上传（备用） -->
        <div class="upload-wrapper">
            <input type="file" id="fileInput" accept=".json" />
            <label for="fileInput" class="upload-label">上传本地文件</label>
        </div>
    </div>
</div>

<div class="main">
    <!-- 左侧文件列表 -->
    <div class="sidebar">
        <div class="sidebar-header" id="sidebarTitle">logs_anthropic</div>
        <div class="file-list" id="fileList">
            <div class="sidebar-empty">加载中…</div>
        </div>
    </div>

    <!-- 右侧消息区 -->
    <div class="chat-panel" id="chatPanel">
        <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
            <p>从左侧选择一个对话文件</p>
        </div>
    </div>
</div>

<script>
    const fileList   = document.getElementById('fileList');
    const chatPanel  = document.getElementById('chatPanel');
    const sidebarTitle = document.getElementById('sidebarTitle');
    let activeItem   = null;

    // ---- 加载文件列表 ----
    async function loadFileList() {
        const min = parseInt(document.getElementById('minMessages').value) || 10;
        fileList.innerHTML = '<div class="sidebar-empty"><span class="spinner"></span>加载中…</div>';
        sidebarTitle.textContent = `logs_anthropic（>${min} 条消息）`;

        try {
            const res = await fetch(`/logs/anthropic/list?min_messages=${min}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const files = await res.json();

            if (!files.length) {
                fileList.innerHTML = '<div class="sidebar-empty">没有满足条件的文件</div>';
                return;
            }

            fileList.innerHTML = '';
            files.forEach(item => {
                const el = document.createElement('div');
                el.className = 'file-item';

                // 从文件名提取时间戳显示（去掉 -req.json）
                const ts = item.filename.replace('-req.json', '').replace(/_/g, ' ');
                el.innerHTML = `
                    <div class="file-item-name">${ts}</div>
                    <div class="file-item-meta">${item.message_count} 条消息 · ${item.model || '未知模型'}</div>
                `;
                el.addEventListener('click', () => selectFile(item.filename, el));
                fileList.appendChild(el);
            });
        } catch (e) {
            fileList.innerHTML = `<div class="sidebar-empty">加载失败：${e.message}</div>`;
        }
    }

    // ---- 选择文件 ----
    async function selectFile(filename, el) {
        if (activeItem) activeItem.classList.remove('active');
        el.classList.add('active');
        activeItem = el;

        chatPanel.innerHTML = '<div class="empty-state"><span class="spinner"></span><p>加载中…</p></div>';

        try {
            const res = await fetch(`/logs/anthropic/file?filename=${encodeURIComponent(filename)}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderMessages(data, filename);
        } catch (e) {
            showError(`加载失败：${e.message}`);
        }
    }

    // ---- 本地上传（备用） ----
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                renderMessages(JSON.parse(ev.target.result), file.name);
                if (activeItem) activeItem.classList.remove('active');
                activeItem = null;
            } catch (err) {
                showError('JSON 解析失败：' + err.message);
            }
        };
        reader.onerror = () => showError('文件读取失败');
        reader.readAsText(file);
    });

    // ---- 渲染消息 ----
    function renderMessages(data, filename) {
        chatPanel.innerHTML = '';

        let messages = data.messages ?? (Array.isArray(data) ? data : null);
        if (!messages) { showError('未找到 messages 字段'); return; }
        if (!messages.length) { showError('messages 为空'); return; }

        // 元数据
        if (data.model || data.temperature !== undefined || data.max_tokens) {
            const meta = document.createElement('div');
            meta.className = 'metadata';
            meta.innerHTML = `
                <div class="metadata-title">📋 请求信息</div>
                ${data.model ? `<div class="metadata-item"><strong>模型</strong>${data.model}</div>` : ''}
                ${data.temperature !== undefined ? `<div class="metadata-item"><strong>Temperature</strong>${data.temperature}</div>` : ''}
                ${data.max_tokens ? `<div class="metadata-item"><strong>Max Tokens</strong>${data.max_tokens}</div>` : ''}
                <div class="metadata-item"><strong>消息数</strong>${messages.length} 条</div>
                <div class="metadata-item"><strong>文件</strong>${filename}</div>
            `;
            chatPanel.appendChild(meta);
        }

        messages.forEach(msg => {
            const role = msg.role || 'unknown';

            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role}`;

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = `avatar ${role}`;
            avatar.textContent = role === 'user' ? '👤' : role === 'assistant' ? '🤖' : '⚙️';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = extractText(msg.content);

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            wrapper.appendChild(msgDiv);
            chatPanel.appendChild(wrapper);
        });
    }

    function extractText(content) {
        if (typeof content === 'string') return content;
        if (Array.isArray(content)) {
            return content.map(item => {
                if (item.type === 'text') return item.text;
                if (item.type === 'image' || item.type === 'image_url') return '[图片]';
                return JSON.stringify(item);
            }).join('\n');
        }
        return JSON.stringify(content, null, 2);
    }

    function showError(msg) {
        chatPanel.innerHTML = `<div class="error-box"><strong>错误：</strong>${msg}</div>`;
    }

    // ---- 初始化 ----
    loadFileList();
</script>
</body>
</html>
