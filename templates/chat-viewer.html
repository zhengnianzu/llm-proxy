<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7f7f8;
            color: #2d3748;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========= Header ========= */
        .header {
            background: #fff;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 12px;
        }
        .header h1 { font-size: 17px; font-weight: 600; color: #1a202c; white-space: nowrap; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .min-msg-label { font-size: 13px; color: #6b7280; white-space: nowrap; }
        .min-msg-input {
            width: 60px; padding: 5px 8px;
            border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 13px; text-align: center;
        }
        .btn {
            padding: 7px 14px; border: none; border-radius: 7px;
            cursor: pointer; font-size: 13px; font-weight: 500;
            transition: background .18s; white-space: nowrap;
        }
        .btn-green  { background: #10a37f; color: #fff; }
        .btn-green:hover { background: #0d8c6e; }
        .btn-indigo { background: #6366f1; color: #fff; }
        .btn-indigo:hover { background: #4f46e5; }
        .upload-wrapper { position: relative; }
        .upload-wrapper input[type="file"] { position: absolute; opacity: 0; width: 0; height: 0; }

        /* ========= Layout ========= */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* ========= Sidebar ========= */
        .sidebar {
            width: 270px; flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-hdr {
            padding: 10px 14px;
            font-size: 11px; font-weight: 600; color: #9ca3af;
            text-transform: uppercase; letter-spacing: .06em;
            border-bottom: 1px solid #f3f4f6;
            flex-shrink: 0;
        }
        .file-list { flex: 1; overflow-y: auto; }
        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        .file-item {
            padding: 11px 14px; cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
            border-left: 3px solid transparent;
            transition: background .13s;
        }
        .file-item:hover { background: #f9fafb; }
        .file-item.active { background: #f0fdf4; border-left-color: #10a37f; }
        .file-item-name { font-size: 12px; color: #374151; word-break: break-all; line-height: 1.4; }
        .file-item-meta { margin-top: 3px; font-size: 11px; color: #9ca3af; }

        .sidebar-tip { padding: 20px 14px; font-size: 13px; color: #9ca3af; text-align: center; }

        /* ========= Chat panel ========= */
        .chat-panel { flex: 1; overflow-y: auto; padding: 24px 28px; background: #f7f7f8; }
        .chat-panel::-webkit-scrollbar { width: 6px; }
        .chat-panel::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; color: #9ca3af; gap: 12px;
        }
        .empty-state svg { width: 52px; height: 52px; opacity: .22; stroke: #9ca3af; }
        .empty-state p { font-size: 15px; }

        /* ========= Metadata bar ========= */
        .metadata {
            background: #fff; border-radius: 10px;
            padding: 14px 18px; margin-bottom: 22px;
            font-size: 13px; color: #6b7280;
            border: 1px solid #e5e7eb;
        }
        .metadata-title { font-weight: 600; margin-bottom: 8px; color: #1a202c; font-size: 14px; }
        .metadata-item { display: flex; gap: 8px; padding: 3px 0; }
        .metadata-item strong { color: #374151; min-width: 100px; }

        /* ========= Message row ========= */
        .msg-row {
            display: flex;
            margin-bottom: 18px;
            gap: 10px;
        }
        /* user: left; assistant: right */
        .msg-row.user     { justify-content: flex-start; }
        .msg-row.assistant{ justify-content: flex-end; }

        .msg-row.user     .msg-bubble-col { align-items: flex-start; }
        .msg-row.assistant .msg-bubble-col { align-items: flex-end; }

        .msg-bubble-col {
            display: flex; flex-direction: column; gap: 6px;
            max-width: 70%;
        }

        /* avatar */
        .avatar {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0; margin-top: 2px;
        }
        .avatar.user      { background: linear-gradient(135deg,#667eea,#764ba2); }
        .avatar.assistant { background: linear-gradient(135deg,#10a37f,#0d8c6e); }

        /* ========= Block cards ========= */
        .block {
            border-radius: 10px;
            overflow: hidden;
            font-size: 14px;
            line-height: 1.65;
            word-break: break-word;
        }

        /* — text block — */
        .block.text {
            background: #dbeafe;          /* light blue */
            border: 1px solid #bfdbfe;
            padding: 12px 16px;
            white-space: pre-wrap;
        }

        /* — tool_use block — */
        .block.tool-use {
            background: #fff7ed;          /* light orange */
            border: 1px solid #fed7aa;
        }

        /* — tool_result block — */
        .block.tool-result {
            background: #fff7ed;
            border: 1px solid #fed7aa;
        }
        .block.tool-result.is-error {
            background: #fff1f2;
            border-color: #fecdd3;
        }

        /* block header badge */
        .block-hdr {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px;
            font-size: 11px; font-weight: 600;
            border-bottom: 1px solid rgba(0,0,0,.07);
            color: #92400e;
            background: rgba(0,0,0,.03);
        }
        .block-hdr .badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 999px;
            font-size: 10px; font-weight: 700;
            letter-spacing: .03em;
        }
        .badge-tool-use    { background: #fb923c; color: #fff; }
        .badge-tool-result { background: #f97316; color: #fff; }
        .badge-error       { background: #f43f5e; color: #fff; }

        .block-hdr .tool-name  { color: #78350f; font-weight: 700; }
        .block-hdr .tool-id    { color: #b45309; font-size: 10px; font-family: monospace; }

        /* block body */
        .block-body { padding: 10px 14px; }

        /* command pre */
        .cmd-pre {
            background: #1e1e2e;
            color: #cdd6f4;
            border-radius: 7px;
            padding: 10px 14px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 12.5px;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 4px 0 0;
            line-height: 1.6;
        }
        .cmd-label {
            font-size: 11px; color: #6b7280; margin-bottom: 4px; font-weight: 500;
        }

        /* tool result content */
        .result-pre {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 8px 12px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #374151;
            margin-top: 4px;
            line-height: 1.55;
            max-height: 260px;
            overflow-y: auto;
        }
        .result-pre.is-error { background: #fff1f2; color: #9f1239; border-color: #fecdd3; }

        /* other input fields */
        .input-kv { margin-top: 4px; }
        .input-kv .kv-row { display: flex; gap: 6px; font-size: 12.5px; margin-top: 3px; }
        .input-kv .kv-key { color: #92400e; font-weight: 600; min-width: 80px; }
        .input-kv .kv-val { color: #374151; white-space: pre-wrap; word-break: break-all; }

        /* error / loading */
        .error-box {
            background: #fee2e2; color: #991b1b;
            padding: 14px 18px; border-radius: 10px;
            border: 1px solid #fecaca; font-size: 14px;
            margin-bottom: 16px;
        }
        .spinner {
            display: inline-block; width: 15px; height: 15px;
            border: 2px solid #d1d5db; border-top-color: #10a37f;
            border-radius: 50%; animation: spin .6s linear infinite;
            vertical-align: middle; margin-right: 5px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h1>💬 Chat Viewer</h1>
    <div class="header-right">
        <span class="min-msg-label">最少消息数</span>
        <input class="min-msg-input" type="number" id="minMessages" value="10" min="1" />
        <button class="btn btn-green" onclick="loadFileList()">刷新列表</button>
        <div class="upload-wrapper">
            <input type="file" id="fileInput" accept=".json" />
            <label for="fileInput" class="btn btn-indigo">上传本地文件</label>
        </div>
    </div>
</div>

<div class="main">

    <!-- 左侧文件列表 -->
    <div class="sidebar">
        <div class="sidebar-hdr" id="sidebarTitle">logs_anthropic</div>
        <div class="file-list" id="fileList">
            <div class="sidebar-tip"><span class="spinner"></span>加载中…</div>
        </div>
    </div>

    <!-- 右侧对话 -->
    <div class="chat-panel" id="chatPanel">
        <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863
                       9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3
                       12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
            <p>从左侧选择一个对话文件</p>
        </div>
    </div>
</div>

<script>
// ----------------------------------------------------------------
// Sidebar: file list
// ----------------------------------------------------------------
const fileListEl   = document.getElementById('fileList');
const chatPanel    = document.getElementById('chatPanel');
const sidebarTitle = document.getElementById('sidebarTitle');
let activeItem = null;

async function loadFileList() {
    const min = parseInt(document.getElementById('minMessages').value) || 10;
    fileListEl.innerHTML = '<div class="sidebar-tip"><span class="spinner"></span>加载中…</div>';
    sidebarTitle.textContent = `logs_anthropic (>${min} 条)`;
    try {
        const res = await fetch(`/logs/anthropic/list?min_messages=${min}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const files = await res.json();
        if (!files.length) {
            fileListEl.innerHTML = '<div class="sidebar-tip">没有满足条件的文件</div>';
            return;
        }
        fileListEl.innerHTML = '';
        files.forEach(item => {
            const el = document.createElement('div');
            el.className = 'file-item';
            const ts = item.filename.replace('-req.json', '').replace(/_/g, ' ');
            el.innerHTML = `
                <div class="file-item-name">${ts}</div>
                <div class="file-item-meta">${item.message_count} 条 · ${item.model || '未知模型'}</div>
            `;
            el.addEventListener('click', () => selectFile(item.filename, el));
            fileListEl.appendChild(el);
        });
    } catch(e) {
        fileListEl.innerHTML = `<div class="sidebar-tip">加载失败：${e.message}</div>`;
    }
}

async function selectFile(filename, el) {
    if (activeItem) activeItem.classList.remove('active');
    el.classList.add('active');
    activeItem = el;
    chatPanel.innerHTML = '<div class="empty-state"><span class="spinner"></span><p>加载中…</p></div>';
    try {
        const res = await fetch(`/logs/anthropic/file?filename=${encodeURIComponent(filename)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        renderMessages(await res.json(), filename);
    } catch(e) {
        showError(`加载失败：${e.message}`);
    }
}

// 本地上传备用
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            renderMessages(JSON.parse(ev.target.result), file.name);
            if (activeItem) { activeItem.classList.remove('active'); activeItem = null; }
        } catch(err) { showError('JSON 解析失败：' + err.message); }
    };
    reader.onerror = () => showError('文件读取失败');
    reader.readAsText(file);
});

// ----------------------------------------------------------------
// Render
// ----------------------------------------------------------------
function renderMessages(data, filename) {
    chatPanel.innerHTML = '';
    const messages = data.messages ?? (Array.isArray(data) ? data : null);
    if (!messages) { showError('未找到 messages 字段'); return; }
    if (!messages.length) { showError('messages 为空'); return; }

    // Metadata bar
    if (data.model || data.temperature !== undefined || data.max_tokens) {
        const meta = document.createElement('div');
        meta.className = 'metadata';
        meta.innerHTML = `
            <div class="metadata-title">📋 请求信息</div>
            ${data.model ? `<div class="metadata-item"><strong>模型</strong><span>${data.model}</span></div>` : ''}
            ${data.temperature !== undefined ? `<div class="metadata-item"><strong>Temperature</strong><span>${data.temperature}</span></div>` : ''}
            ${data.max_tokens ? `<div class="metadata-item"><strong>Max Tokens</strong><span>${data.max_tokens}</span></div>` : ''}
            <div class="metadata-item"><strong>消息数</strong><span>${messages.length} 条</span></div>
            <div class="metadata-item"><strong>文件</strong><span>${filename}</span></div>
        `;
        chatPanel.appendChild(meta);
    }

    messages.forEach(msg => {
        const role = msg.role || 'unknown';
        const content = Array.isArray(msg.content)
            ? msg.content
            : [{ type: 'text', text: typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content, null, 2) }];

        const row = document.createElement('div');
        row.className = `msg-row ${role}`;

        const avatar = document.createElement('div');
        avatar.className = `avatar ${role}`;
        avatar.textContent = role === 'user' ? '👤' : role === 'assistant' ? '🤖' : '⚙️';

        const col = document.createElement('div');
        col.className = 'msg-bubble-col';

        content.forEach(block => col.appendChild(renderBlock(block)));

        if (role === 'user') {
            row.appendChild(avatar);
            row.appendChild(col);
        } else {
            row.appendChild(col);
            row.appendChild(avatar);
        }
        chatPanel.appendChild(row);
    });
}

// ----------------------------------------------------------------
// Block renderers
// ----------------------------------------------------------------
function renderBlock(block) {
    switch (block.type) {
        case 'text':       return renderTextBlock(block);
        case 'tool_use':   return renderToolUseBlock(block);
        case 'tool_result':return renderToolResultBlock(block);
        default:           return renderFallbackBlock(block);
    }
}

function renderTextBlock(block) {
    const el = document.createElement('div');
    el.className = 'block text';
    el.textContent = block.text || '';
    return el;
}

function renderToolUseBlock(block) {
    const el = document.createElement('div');
    el.className = 'block tool-use';

    // header
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `
        <span class="badge badge-tool-use">tool_use</span>
        <span class="tool-name">${esc(block.name || '')}</span>
        <span class="tool-id">${esc(block.id || '')}</span>
    `;
    el.appendChild(hdr);

    // body
    const body = document.createElement('div');
    body.className = 'block-body';
    const input = block.input || {};

    if (input.command !== undefined) {
        // command: show as dark code block
        const lbl = document.createElement('div');
        lbl.className = 'cmd-label';
        lbl.textContent = '$ command';
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre';
        pre.textContent = input.command;
        body.appendChild(lbl);
        body.appendChild(pre);

        // other keys besides command
        const others = Object.entries(input).filter(([k]) => k !== 'command');
        if (others.length) body.appendChild(renderKV(others));
    } else if (Object.keys(input).length) {
        body.appendChild(renderKV(Object.entries(input)));
    } else {
        body.textContent = '(no input)';
    }

    el.appendChild(body);
    return el;
}

function renderToolResultBlock(block) {
    const isError = block.is_error;
    const el = document.createElement('div');
    el.className = `block tool-result${isError ? ' is-error' : ''}`;

    // header
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `
        <span class="badge ${isError ? 'badge-error' : 'badge-tool-result'}">${isError ? 'error' : 'tool_result'}</span>
        <span class="tool-id">${esc(block.tool_use_id || '')}</span>
    `;
    el.appendChild(hdr);

    // body
    const body = document.createElement('div');
    body.className = 'block-body';

    const rawContent = block.content;
    const text = typeof rawContent === 'string'
        ? rawContent
        : JSON.stringify(rawContent, null, 2);

    const pre = document.createElement('pre');
    pre.className = `result-pre${isError ? ' is-error' : ''}`;
    pre.textContent = text || '(no output)';
    body.appendChild(pre);
    el.appendChild(body);
    return el;
}

function renderFallbackBlock(block) {
    const el = document.createElement('div');
    el.className = 'block text';
    el.textContent = JSON.stringify(block, null, 2);
    return el;
}

// ----------------------------------------------------------------
// Helpers
// ----------------------------------------------------------------
function renderKV(entries) {
    const wrap = document.createElement('div');
    wrap.className = 'input-kv';
    entries.forEach(([k, v]) => {
        const row = document.createElement('div');
        row.className = 'kv-row';
        const keyEl = document.createElement('span');
        keyEl.className = 'kv-key';
        keyEl.textContent = k + ':';
        const valEl = document.createElement('span');
        valEl.className = 'kv-val';
        valEl.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
        row.appendChild(keyEl);
        row.appendChild(valEl);
        wrap.appendChild(row);
    });
    return wrap;
}

function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showError(msg) {
    chatPanel.innerHTML = `<div class="error-box"><strong>错误：</strong>${msg}</div>`;
}

// init
loadFileList();
</script>
</body>
</html>
