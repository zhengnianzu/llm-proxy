# sync_sessions.py 配置文件
# 用法: python sync_sessions.py --config sync_config.yaml
#
# 模式由字段组合决定（--src 控制）:
#   有 src + 无 session_dir → raw 模式（上传原始三元组到 obs_raw）
#   有 src + 有 session_dir → export 模式（export 到 session_dir 再上传到 obs_session）
#                             同时指定 obs_raw 则双备份（先 raw，再 session）
#   无 src + 有 session_dir → upload-only 模式（读 index.jsonl 上传到 obs_session）
#
# upload_erase 控制上传成功后是否清除本地数据:
#   raw 模式:        删除 src 中已上传的三元组文件
#   export 模式:     上传 session folder 成功后删除 src 中对应的原始文件
#   upload-only 模式: 删除本地已上传的 session folder

src: /home/nianzuzheng/project/LLM_PROXY-PT/logs_anthropic
session_dir: /home/nianzuzheng/project/LLM_PROXY-PT/sessions_out

# OBS 目标（至少指定一个）
obs_raw:     obs://rl-agentdata/zhengnianzu/raw/       # 原始三元组备份
obs_session: obs://rl-agentdata/zhengnianzu/sessions/  # session 格式上传

# 上传后是否清除本地数据（默认 false）
upload_erase: false

# 上传脚本（可选，不填则使用 obs_utils）
# 脚本签名: <script> <local_path> <obs_path>
upload_script: tools/obs_upload.sh

# 可选（以下为默认值）
interval_seconds: 3600   # 同步间隔（秒），默认 1 小时
upload_workers: 4        # 并发上传数

# 日志（供 cli.py 读取）
log_file: logs/sync.log
log_level: INFO   # DEBUG | INFO | WARNING | ERROR
