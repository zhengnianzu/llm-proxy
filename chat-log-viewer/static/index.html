<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trace Analytics Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f3f6fb;
            --surface: #ffffff;
            --surface-alt: #eef3f9;
            --text: #1f2a37;
            --muted: #6b7280;
            --primary: #0f6c7b;
            --primary-soft: #d8eef2;
            --success: #1f9d68;
            --warn: #d97706;
            --danger: #d64545;
            --border: #dbe3ec;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========= Header ========= */
        .header {
            background: linear-gradient(90deg, #0f2733, #123e4a);
            padding: 12px 18px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 12px;
        }
        .header-left { display: flex; align-items: center; gap: 18px; min-width: 0; }
        .header h1 { font-size: 17px; font-weight: 700; color: #f8fbfd; white-space: nowrap; }
        .nav-tabs { display: flex; align-items: center; gap: 8px; }
        .nav-tab {
            padding: 7px 12px; border-radius: 999px; border: 1px solid transparent;
            color: #b8d6dc; background: transparent; font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .nav-tab.active { background: rgba(255,255,255,.12); color: #fff; border-color: rgba(255,255,255,.12); }
        .nav-tab.disabled { opacity: .55; cursor: not-allowed; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .label { font-size: 12px; color: #cfe2e7; white-space: nowrap; }
        .dir-select {
            min-width: 240px;
            max-width: 420px;
            padding: 7px 10px;
            border: 1px solid rgba(255,255,255,.18);
            border-radius: 7px;
            font-size: 13px;
            color: #f1f5f9;
            background: rgba(255,255,255,.06);
            outline: none;
        }
        .dir-select:focus { border-color: #8ec9d4; }
        .dir-select option { color: #1f2a37; background: #fff; }
        .btn {
            padding: 7px 14px; border: none; border-radius: 7px;
            cursor: pointer; font-size: 13px; font-weight: 500;
            transition: background .18s; white-space: nowrap;
        }
        .btn-green { background: #1f9d68; color: #fff; }
        .btn-green:hover { background: #167c52; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-outline:hover { background: var(--primary-soft); }
        .btn-ghost { background: rgba(255,255,255,.08); color: #edf8fb; border: 1px solid rgba(255,255,255,.12); }
        .stats-chip {
            font-size: 11px; color: #e5f3f6; padding: 3px 8px;
            background: rgba(255,255,255,.09); border-radius: 999px; white-space: nowrap;
        }

        /* ========= Layout ========= */
        .main { display: flex; flex: 1; overflow: hidden; }
        .view { display: none; flex: 1; overflow: hidden; }
        .view.active { display: flex; }

        /* ========= Sidebar ========= */
        .sidebar {
            width: 350px; flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-toolbar {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex; flex-direction: column; gap: 8px;
            background: linear-gradient(180deg, #f9fbfe, #f2f7fb);
        }
        .search-input {
            flex: 1; padding: 5px 9px;
            border: 1px solid #cfd9e5; border-radius: 6px;
            font-size: 12px; outline: none;
        }
        .search-input:focus { border-color: var(--primary); }
        .toolbar-row { display: flex; gap: 6px; }
        .toolbar-row > * { flex: 1; min-width: 0; }
        .mini-select, .mini-input {
            width: 100%; padding: 6px 8px; border-radius: 6px;
            border: 1px solid #cfd9e5; background: #fff; font-size: 12px; outline: none;
        }
        .mini-select:focus, .mini-input:focus { border-color: var(--primary); }
        .preset-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .preset-chip {
            padding: 5px 8px; font-size: 11px; border-radius: 999px; cursor: pointer;
            border: 1px solid #c8d9e7; background: #fff; color: #375069;
        }
        .preset-chip:hover { background: #eef6fb; }
        .filter-list { display: flex; flex-direction: column; gap: 6px; }
        .filter-chip {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            padding: 7px 9px; font-size: 11px; border-radius: 10px; background: #fff;
            border: 1px solid #d7e3ed; color: #395165;
        }
        .filter-chip button {
            border: none; background: transparent; cursor: pointer; color: #9a4e4e; font-size: 12px;
        }
        .sidebar-hdr {
            padding: 7px 14px;
            font-size: 11px; font-weight: 600; color: #9ca3af;
            text-transform: uppercase; letter-spacing: .06em;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .file-list { flex: 1; overflow-y: auto; }
        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        .file-item {
            padding: 10px 14px; cursor: pointer;
            border-bottom: 1px solid #eef2f7;
            border-left: 3px solid transparent;
            transition: background .13s;
        }
        .file-item:hover { background: #f9fafb; }
        .file-item.active { background: #ebf7f9; border-left-color: var(--primary); }
        .file-item-label {
            font-size: 12.5px; color: #1e293b; line-height: 1.45;
            display: -webkit-box; -webkit-line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .file-item-meta { margin-top: 3px; font-size: 11px; color: #9ca3af; }
        .file-item-path { margin-top: 2px; font-size: 10px; color: #c4c9d4; word-break: break-all; }
        .metric-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .metric-pill {
            font-size: 10px; border-radius: 999px; padding: 2px 7px;
            background: #eef4f8; color: #476074; border: 1px solid #d9e4ee;
        }
        .metric-pill.warn { color: #9a5a08; background: #fff6e8; border-color: #f3d8ab; }
        .metric-pill.danger { color: #a33131; background: #fff0f1; border-color: #f2c5c7; }
        .metric-pill.success { color: #16644a; background: #edf9f3; border-color: #cce8d9; }

        .sidebar-tip { padding: 20px 14px; font-size: 13px; color: #9ca3af; text-align: center; }

        /* ========= Chat panel ========= */
        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        .filter-bar {
            padding: 12px 18px; border-bottom: 1px solid var(--border); background: #f7fbfd;
            display: flex; align-items: center; justify-content: space-between; gap: 14px;
        }
        .filter-bar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; min-width: 0; }
        .filter-bar-title { font-size: 12px; font-weight: 700; color: #355264; letter-spacing: .06em; text-transform: uppercase; }
        .filter-pill-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-pill {
            display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 999px;
            background: #fff; border: 1px solid #d6e3ed; color: #3f5769; font-size: 12px;
        }
        .filter-pill button {
            border: none; background: transparent; color: #935555; cursor: pointer; font-size: 12px;
        }
        .filter-bar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
        .chat-panel { flex: 1; overflow-y: auto; padding: 24px 28px; background: var(--bg); }
        .chat-panel::-webkit-scrollbar { width: 6px; }
        .chat-panel::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

        .scroll-bottom-btn {
            position: absolute; bottom: 24px; right: 24px;
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--primary); color: #fff; border: none;
            cursor: pointer; font-size: 18px; line-height: 1;
            box-shadow: 0 2px 8px rgba(0,0,0,.18);
            display: none; align-items: center; justify-content: center;
            z-index: 10; transition: opacity .2s;
        }
        .scroll-bottom-btn:hover { background: #0a5563; }
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(15, 28, 38, .48);
            display: none; align-items: center; justify-content: center; z-index: 50; padding: 24px;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            width: min(760px, 100%); background: #fff; border-radius: 18px; border: 1px solid #d9e4ec;
            box-shadow: 0 20px 60px rgba(13, 29, 41, .24); overflow: hidden;
        }
        .modal-header {
            padding: 16px 20px; background: linear-gradient(135deg, #1f4e79 0%, #2e75b6 100%);
            color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .modal-header h3 { font-size: 18px; font-weight: 700; }
        .modal-close {
            border: 1px solid rgba(255,255,255,.22); background: rgba(255,255,255,.1); color: #fff;
            border-radius: 10px; width: 32px; height: 32px; cursor: pointer;
        }
        .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
        .modal-footer {
            padding: 14px 20px 20px; display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .modal-actions { display: flex; gap: 8px; }
        .modal-hint { font-size: 12px; color: #708595; }
        .detail-panel {
            width: 320px; flex-shrink: 0; background: #f8fbfd; border-left: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .detail-panel.collapsed { width: 52px; }
        .detail-header {
            padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; gap: 8px; background: #f4f9fc;
        }
        .detail-title { font-size: 13px; font-weight: 700; color: #294154; }
        .detail-toggle {
            border: 1px solid #cddce8; background: #fff; color: #486172; border-radius: 8px;
            width: 28px; height: 28px; cursor: pointer;
        }
        .detail-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
        .detail-panel.collapsed .detail-body,
        .detail-panel.collapsed .detail-title { display: none; }
        .detail-empty { color: #90a0af; font-size: 13px; line-height: 1.6; }
        .insight-card {
            background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 12px;
            box-shadow: 0 1px 2px rgba(15, 35, 55, 0.04);
        }
        .insight-card h3 { font-size: 12px; color: #577084; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
        .insight-row { display: flex; justify-content: space-between; gap: 10px; padding: 5px 0; font-size: 12.5px; }
        .insight-row strong { color: #243849; font-weight: 600; }
        .insight-row span { color: #607282; text-align: right; word-break: break-word; }
        .analysis-badge {
            display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 10px; font-weight: 700;
            background: #edf7fb; color: var(--primary); border: 1px solid #cde2ea;
        }
        .analysis-badge.missing { background: #f3f4f6; color: #6b7280; border-color: #dde1e6; }
        .detail-list { display: flex; flex-direction: column; gap: 6px; }
        .detail-list-item {
            display: flex; justify-content: space-between; gap: 8px; font-size: 12px;
            padding: 6px 8px; border-radius: 8px; background: #f8fafc; border: 1px solid #e7edf4;
        }
        .detail-list-item code { font-size: 11px; }
        .analysis-view, .reports-view {
            flex: 1; overflow-y: auto; padding: 28px 32px; background: var(--bg);
        }
        .reports-view.active, .analysis-view.active {
            display: block;
        }
        .analysis-layout { display: flex; flex-direction: column; gap: 20px; }

        /* -- Analysis Hero -- */
        .analysis-hero {
            background: linear-gradient(135deg, #0e4d5e 0%, #1a7a8a 50%, #2e9dad 100%);
            border-radius: 16px; padding: 24px 28px; color: #fff;
            box-shadow: 0 8px 24px rgba(14, 77, 94, .18);
            display: flex; align-items: center; justify-content: space-between; gap: 20px;
        }
        .analysis-hero-text h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .analysis-hero-text p { font-size: 13px; color: rgba(255,255,255,.78); }
        .analysis-hero-stats { display: flex; gap: 16px; flex-shrink: 0; }
        .analysis-hero-stat {
            background: rgba(255,255,255,.13); border-radius: 12px; padding: 14px 18px;
            text-align: center; min-width: 100px; backdrop-filter: blur(4px);
        }
        .analysis-hero-stat .stat-value { font-size: 26px; font-weight: 700; }
        .analysis-hero-stat .stat-label { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 2px; text-transform: uppercase; letter-spacing: .06em; }

        /* -- KPI Cards -- */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
        .kpi-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px;
            box-shadow: 0 2px 8px rgba(19, 37, 55, .04);
            display: flex; align-items: flex-start; gap: 14px;
            transition: box-shadow .2s, transform .2s;
        }
        .kpi-card:hover { box-shadow: 0 4px 16px rgba(19, 37, 55, .08); transform: translateY(-1px); }
        .kpi-icon {
            width: 42px; height: 42px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
        }
        .kpi-icon.blue   { background: #e8f4f8; }
        .kpi-icon.orange { background: #fff3e0; }
        .kpi-icon.red    { background: #ffeef0; }
        .kpi-icon.green  { background: #e8f5e9; }
        .kpi-icon.purple { background: #f3e8ff; }
        .kpi-body { flex: 1; min-width: 0; }
        .kpi-label { font-size: 12px; color: #698090; text-transform: uppercase; letter-spacing: .05em; }
        .kpi-value { font-size: 26px; font-weight: 700; color: #173043; margin-top: 6px; line-height: 1.1; }
        .kpi-note { margin-top: 4px; font-size: 11px; color: #9aabb8; }

        /* -- Chart Cards -- */
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
        .chart-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
            box-shadow: 0 2px 8px rgba(19, 37, 55, .04); overflow: hidden;
            transition: box-shadow .2s;
        }
        .chart-card:hover { box-shadow: 0 4px 16px rgba(19, 37, 55, .08); }
        .chart-card-header {
            padding: 14px 18px 10px; border-bottom: 1px solid #f0f4f8;
            display: flex; align-items: center; gap: 8px;
        }
        .chart-card-header .chart-icon { font-size: 16px; }
        .chart-card-header h3 { font-size: 14px; color: #203646; font-weight: 600; margin: 0; }
        .chart-card-body { padding: 14px 18px 18px; }
        .dist-list { display: flex; flex-direction: column; gap: 10px; }
        .dist-row {
            display: grid; grid-template-columns: 90px 1fr 64px; gap: 10px;
            align-items: center; font-size: 12px; padding: 4px 6px; border-radius: 8px;
            transition: background .15s;
        }
        .dist-row:hover { background: #f7fafc; }
        .dist-row strong { color: #40596b; font-weight: 600; }
        .dist-bar { height: 12px; border-radius: 999px; background: #edf3f7; overflow: hidden; }
        .dist-bar-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }
        .dist-bar-fill.bar-teal    { background: linear-gradient(90deg, #2f7e8d, #5cb8c4); }
        .dist-bar-fill.bar-emerald { background: linear-gradient(90deg, #10b981, #6ee7b7); }
        .dist-bar-fill.bar-amber   { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .dist-bar-fill.bar-rose    { background: linear-gradient(90deg, #e11d48, #fb7185); }
        .dist-bar-fill.bar-indigo  { background: linear-gradient(90deg, #6366f1, #a5b4fc); }
        .dist-bar-fill.bar-sky     { background: linear-gradient(90deg, #0ea5e9, #7dd3fc); }
        .dist-bar-fill.bar-violet  { background: linear-gradient(90deg, #8b5cf6, #c4b5fd); }
        .dist-value { text-align: right; color: #5f7485; font-variant-numeric: tabular-nums; font-size: 12px; }
        .dist-row.clickable { cursor: pointer; }
        .dist-row.clickable:hover { background: #eef5fa; }
        .dist-row.clickable:hover strong { color: var(--primary); }
        .analysis-empty {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 24px;
            color: #72889a; font-size: 14px; text-align: center;
        }
        .filter-summary {
            padding: 8px 12px; border-bottom: 1px solid var(--border); background: #f8fbfe;
            font-size: 12px; color: #5d7486; display: none;
        }
        .filter-summary.active { display: block; }
        .filter-summary strong { color: #244050; }
        .summary-hero {
            max-width: 1100px; margin: 0 auto 20px; background: linear-gradient(135deg, #1a3a5c 0%, #2b6cb0 60%, #3b82c4 100%);
            border-radius: 16px; padding: 28px 32px; color: #fff; box-shadow: 0 8px 24px rgba(26, 58, 92, .18);
        }
        .summary-hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        .summary-hero p { font-size: 13px; color: rgba(255, 255, 255, .78); text-align: center; }
        .summary-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px; margin-top: 22px;
        }
        .summary-card {
            background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.1); border-radius: 12px;
            padding: 18px 16px; text-align: center; backdrop-filter: blur(4px);
            transition: background .2s;
        }
        .summary-card:hover { background: rgba(255,255,255,.18); }
        .summary-card h3 { font-size: 11px; color: rgba(255,255,255,.7); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .08em; }
        .summary-card p { color: #fff; font-size: 28px; font-weight: 700; line-height: 1.1; }
        /* -- Source Cards (vertical layout) -- */
        .source-cards {
            max-width: 1100px; margin: 0 auto;
            display: flex; flex-direction: column; gap: 16px;
        }
        .source-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
            box-shadow: 0 2px 8px rgba(19, 37, 55, .04); overflow: hidden;
            transition: box-shadow .2s;
        }
        .source-card:hover { box-shadow: 0 4px 16px rgba(19, 37, 55, .08); }
        .source-card-header {
            padding: 16px 20px; border-bottom: 1px solid #eef3f8;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .source-card-title { font-size: 15px; font-weight: 700; color: #1a3a5c; }
        .source-card-path { font-size: 11px; color: #8a9bb0; margin-top: 2px; word-break: break-all; }
        .source-card-badge {
            font-size: 11px; padding: 4px 10px; border-radius: 999px; font-weight: 600;
            background: #eef6fb; color: #2e6676; border: 1px solid #d2e5ed; white-space: nowrap;
        }
        .source-card-body { padding: 16px 20px; }
        .source-metrics {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px;
        }
        .source-metric {
            display: flex; flex-direction: column; gap: 4px;
        }
        .source-metric-label {
            font-size: 11px; color: #698090; text-transform: uppercase; letter-spacing: .04em;
        }
        .source-metric-value {
            font-size: 20px; font-weight: 700; color: #173043; font-variant-numeric: tabular-nums;
        }
        .source-metric-value.warn { color: var(--warn); }
        .source-metric-value.danger { color: var(--danger); }
        .source-metric-value.success { color: var(--success); }
        .source-rate-row {
            display: flex; flex-direction: column; gap: 10px; margin-top: 14px;
            padding-top: 14px; border-top: 1px solid #f0f4f8;
        }
        .source-rate-item {
            display: flex; align-items: center; gap: 12px;
        }
        .source-rate-label { font-size: 12px; color: #698090; min-width: 80px; }
        .source-rate-bar { flex: 1; }
        .source-card-footer {
            padding: 12px 20px; border-top: 1px solid #eef3f8;
            display: flex; align-items: center; gap: 12px;
        }
        .source-report-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 600; color: #2e75b6; text-decoration: none;
            padding: 6px 14px; border-radius: 8px; border: 1px solid #d2e5ed;
            background: #f5fafd; transition: background .15s, border-color .15s;
        }
        .source-report-link:hover { background: #e8f2fa; border-color: #a8cde0; }

        .summary-pill {
            display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
            background: #eef6fb; color: #2e6676; border: 1px solid #d2e5ed;
        }
        .rate-bar { display: flex; align-items: center; gap: 8px; min-width: 180px; }
        .bar-wrap { flex: 1; background: #e8edf5; border-radius: 999px; height: 10px; overflow: hidden; }
        .bar-fill  { height: 100%; border-radius: 999px; transition: width .4s ease; }
        .bar-green { background: linear-gradient(90deg, #34c759, #5ae075); }
        .bar-blue  { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .bar-pct   { font-size: 12px; color: #4a5e6d; font-weight: 600; min-width: 46px; text-align: right; font-variant-numeric: tabular-nums; }
        .summary-empty {
            max-width: 1100px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 48px 24px; text-align: center; color: #8298a8;
        }
        .summary-empty .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
        .summary-empty p { font-size: 14px; }
        .placeholder-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
        .placeholder-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px;
            min-height: 140px; box-shadow: 0 2px 8px rgba(19, 37, 55, .04);
        }
        .placeholder-card h3 { font-size: 14px; margin-bottom: 10px; color: #203646; }
        .placeholder-card p { color: #698090; font-size: 13px; line-height: 1.7; }

        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; color: #9ca3af; gap: 12px;
        }
        .empty-state svg { width: 52px; height: 52px; opacity: .22; stroke: #9ca3af; }
        .empty-state p { font-size: 15px; }

        /* ========= Metadata bar ========= */
        .metadata {
            background: #fff; border-radius: 10px;
            padding: 14px 18px; margin-bottom: 22px;
            font-size: 13px; color: #6b7280;
            border: 1px solid #e5e7eb;
        }
        .metadata-title { font-weight: 600; margin-bottom: 8px; color: #1a202c; font-size: 14px; }
        .metadata-item { display: flex; gap: 8px; padding: 2px 0; }
        .metadata-item strong { color: #374151; min-width: 100px; }

        /* ========= Message row ========= */
        .msg-row { display: flex; margin-bottom: 18px; gap: 10px; }
        .msg-row.user      { justify-content: flex-start; }
        .msg-row.assistant { justify-content: flex-end; }
        .msg-row.user      .msg-bubble-col { align-items: flex-start; }
        .msg-row.assistant .msg-bubble-col { align-items: flex-end; }

        .msg-bubble-col { display: flex; flex-direction: column; gap: 6px; max-width: 60%; }

        .avatar {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0; margin-top: 2px;
        }
        .avatar.user      { background: linear-gradient(135deg,#667eea,#764ba2); }
        .avatar.assistant { background: linear-gradient(135deg,#10a37f,#0d8c6e); }

        /* ========= Block cards ========= */
        .block {
            border-radius: 10px; overflow: hidden;
            font-size: 14px; line-height: 1.65; word-break: break-word;
        }

        /* — text — */
        .block.text {
            background: #dbeafe; border: 1px solid #bfdbfe;
            padding: 12px 16px; white-space: pre-wrap;
        }
        .msg-row.assistant .block.text { background: #dcfce7; border-color: #bbf7d0; }

        /* — reasoning / thinking — */
        .block.reasoning { background: #faf5ff; border: 1px solid #e9d5ff; }
        .reasoning-summary {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; cursor: pointer; user-select: none;
            font-size: 13px; color: #7c3aed; font-weight: 500;
            background: rgba(0,0,0,.02);
        }
        .reasoning-summary:hover { background: rgba(124,58,237,.06); }
        .reasoning-chevron { font-size: 10px; transition: transform .15s; }
        .reasoning-chevron.collapsed { transform: rotate(-90deg); }
        .reasoning-body {
            padding: 10px 14px; font-size: 13px; color: #4c1d95;
            white-space: pre-wrap; border-top: 1px solid #e9d5ff;
            max-height: 380px; overflow-y: auto; background: #fff;
        }
        .reasoning-body.collapsed { display: none; }

        /* — system prompt — */
        .block.system-prompt { background: #f8fafc; border: 1px solid #cbd5e1; }
        .system-summary {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 12px; cursor: pointer; user-select: none;
            font-size: 12px; color: #475569; font-weight: 600;
            background: #f1f5f9;
        }
        .system-summary:hover { background: #e2e8f0; }
        .system-chevron { font-size: 10px; transition: transform .15s; }
        .system-chevron.collapsed { transform: rotate(-90deg); }
        .system-body {
            padding: 10px 14px; font-size: 13px; color: #334155;
            white-space: pre-wrap; border-top: 1px solid #cbd5e1;
            max-height: 300px; overflow-y: auto; background: #fff;
        }
        .system-body.collapsed { display: none; }
        .system-char-count { font-size: 11px; color: #94a3b8; font-weight: 400; }

        /* — tool_use — */
        .block.tool-use { background: #fff7ed; border: 1px solid #fed7aa; }

        /* — tool_result — */
        .block.tool-result { background: #fff7ed; border: 1px solid #fed7aa; }
        .block.tool-result.is-error { background: #fff1f2; border-color: #fecdd3; }

        /* — OpenAI tool role — */
        .block.tool-role { background: #f0fdf4; border: 1px solid #bbf7d0; }

        /* block header */
        .block-hdr {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; font-size: 11px; font-weight: 600;
            border-bottom: 1px solid rgba(0,0,0,.07);
            color: #92400e; background: rgba(0,0,0,.03);
        }
        .block-hdr.tool-role-hdr { color: #166534; }
        .block-hdr .badge {
            display: inline-block; padding: 1px 7px; border-radius: 999px;
            font-size: 10px; font-weight: 700; letter-spacing: .03em;
        }
        .badge-tool-use    { background: #fb923c; color: #fff; }
        .badge-tool-result { background: #f97316; color: #fff; }
        .badge-tool-role   { background: #22c55e; color: #fff; }
        .badge-error       { background: #f43f5e; color: #fff; }
        .block-hdr .tool-name { color: #78350f; font-weight: 700; }
        .block-hdr .tool-id   { color: #b45309; font-size: 10px; font-family: monospace; }

        .block-body { padding: 10px 14px; }

        .cmd-pre {
            background: #1e1e2e; color: #cdd6f4; border-radius: 7px;
            padding: 10px 14px; font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 12.5px; white-space: pre-wrap; word-break: break-all;
            margin: 4px 0 0; line-height: 1.6;
        }
        .cmd-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; font-weight: 500; }

        .result-pre {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 7px;
            padding: 8px 12px; font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 12px; white-space: pre-wrap; word-break: break-all;
            color: #374151; margin-top: 4px; line-height: 1.55;
            max-height: 260px; overflow-y: auto;
        }
        .result-pre.is-error { background: #fff1f2; color: #9f1239; border-color: #fecdd3; }

        .input-kv { margin-top: 4px; }
        .input-kv .kv-row { display: flex; gap: 6px; font-size: 12.5px; margin-top: 3px; }
        .input-kv .kv-key { color: #92400e; font-weight: 600; min-width: 80px; }
        .input-kv .kv-val { color: #374151; white-space: pre-wrap; word-break: break-all; }

        .error-box {
            background: #fee2e2; color: #991b1b;
            padding: 14px 18px; border-radius: 10px;
            border: 1px solid #fecaca; font-size: 14px; margin-bottom: 16px;
        }
        .spinner {
            display: inline-block; width: 15px; height: 15px;
            border: 2px solid #d1d5db; border-top-color: #10a37f;
            border-radius: 50%; animation: spin .6s linear infinite;
            vertical-align: middle; margin-right: 5px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Favorite star button */
        .fav-btn {
            background: none; border: 1px solid var(--border); border-radius: 6px;
            cursor: pointer; font-size: 18px; padding: 4px 10px; color: #b8c4ce;
            transition: all .15s;
        }
        .fav-btn:hover { border-color: #f59e0b; color: #f59e0b; }
        .fav-btn.active { color: #f59e0b; border-color: #f59e0b; }

        /* Bookmark view */
        .bookmark-layout {
            display: flex; height: 100%; overflow: hidden;
        }
        .bookmark-sidebar {
            width: 340px; min-width: 260px; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; background: var(--surface);
        }
        .bookmark-toolbar {
            padding: 10px 12px; border-bottom: 1px solid var(--border);
            display: flex; gap: 8px; align-items: center; flex-shrink: 0;
        }
        .bookmark-toolbar .search-input { flex: 1; }
        .bookmark-list {
            flex: 1; overflow-y: auto; padding: 4px 0;
        }
        .bookmark-main {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        .bookmark-chat-panel {
            flex: 1; overflow-y: auto; padding: 20px 24px;
        }
        .bookmark-item {
            padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f4f8;
            transition: background .1s;
        }
        .bookmark-item:hover { background: var(--surface-alt); }
        .bookmark-item.active { background: var(--primary-soft); border-left: 3px solid var(--primary); }
        .bookmark-item-label { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bookmark-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .bookmark-item-source { font-size: 10px; color: var(--primary); background: var(--primary-soft); padding: 1px 6px; border-radius: 3px; display: inline-block; margin-top: 3px; }
        .bookmark-item-actions { float: right; }
        .bookmark-remove-btn {
            background: none; border: none; cursor: pointer; color: #d64545; font-size: 14px; opacity: .5;
            transition: opacity .15s;
        }
        .bookmark-remove-btn:hover { opacity: 1; }
        .bookmark-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 14px; }
        .bookmark-hdr {
            padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--muted);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .btn-export {
            padding: 5px 12px; font-size: 11px; font-weight: 600; border-radius: 6px;
            border: 1px solid var(--primary); color: var(--primary); background: transparent;
            cursor: pointer; transition: all .15s;
        }
        .btn-export:hover { background: var(--primary); color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1>Trace Analytics Platform</h1>
        <div class="nav-tabs">
            <button class="nav-tab active" data-view="sessions">Sessions</button>
            <button class="nav-tab" data-view="analysis">Analysis</button>
            <button class="nav-tab" data-view="summary">Summary</button>
            <button class="nav-tab" data-view="bookmark">Bookmark</button>
        </div>
    </div>
    <div class="header-right">
        <select id="dirSelect" class="dir-select" style="display:none"></select>
        <button class="btn btn-green" onclick="refreshList()">🔄 刷新</button>
        <span class="stats-chip" id="statsChip" style="display:none"></span>
    </div>
</div>

<div class="main">
    <div class="view active" id="sessionsView">
        <div class="sidebar">
            <div class="sidebar-toolbar">
                <input class="search-input" type="text" id="searchInput" placeholder="搜索首问或路径…" />
            </div>
            <div class="sidebar-hdr" id="sidebarHdr">对话列表</div>
            <div class="file-list" id="fileList">
                <div class="sidebar-tip"><span class="spinner"></span>加载中…</div>
            </div>
        </div>

        <div class="chat-main">
            <div class="filter-bar">
                <div class="filter-bar-left">
                    <div class="filter-bar-title">Filters</div>
                    <div class="filter-pill-list" id="filterPillList"></div>
                </div>
                <div class="filter-bar-right">
                    <select id="sortField" class="mini-select" style="width:180px">
                        <option value="msg_count">按消息数</option>
                        <option value="tool_fail_total" class="analysis-option">按工具失败数</option>
                        <option value="user_turns" class="analysis-option">按用户轮次</option>
                        <option value="tool_success_rate" class="analysis-option">按工具成功率</option>
                        <option value="duration_s" class="analysis-option">按时长</option>
                        <option value="tool_use_count" class="analysis-option">按工具调用数</option>
                    </select>
                    <select id="sortOrder" class="mini-select" style="width:100px">
                        <option value="desc">降序</option>
                        <option value="asc">升序</option>
                    </select>
                    <button class="btn btn-green" id="executeSearchBtn">执行筛选</button>
                    <button class="btn btn-outline" id="openFilterModalBtn">编辑筛选</button>
                    <button class="btn btn-outline" id="clearFilterBtn">清空</button>
                </div>
            </div>
            <div class="filter-summary" id="filterSummary"></div>
            <div class="chat-panel" id="chatPanel">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863
                               9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3
                               12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                    <p>从左侧选择一个对话</p>
                </div>
            </div>
            <button class="scroll-bottom-btn" id="scrollBottomBtn" title="滚动到底部">↓</button>
        </div>

        <aside class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <div class="detail-title">Session 属性</div>
                <button class="detail-toggle" id="detailToggleBtn">→</button>
            </div>
            <div class="detail-body" id="detailBody">
                <div class="detail-empty">选择一条 session 后，这里会显示轮次、工具失败、时长、完成状态等属性。</div>
            </div>
        </aside>
    </div>

    <div class="view analysis-view" id="analysisView">
        <div class="analysis-layout" id="analysisContent">
            <div class="analysis-empty"><span class="spinner"></span>分析数据加载中…</div>
        </div>
    </div>

    <div class="view reports-view" id="summaryView">
        <div class="placeholder-grid">
            <div class="placeholder-card">
                <h3>Summary 视图</h3>
                <p>Summary 视图展示 source 级汇总，包括总条数、成功率和工具成功率。</p>
            </div>
        </div>
    </div>

    <div class="view" id="bookmarkView">
        <div class="bookmark-layout">
            <div class="bookmark-sidebar">
                <div class="bookmark-toolbar">
                    <input class="search-input" type="text" id="bookmarkSearch" placeholder="搜索收藏…" />
                </div>
                <div class="bookmark-hdr">
                    <span id="bookmarkCount">0 条收藏</span>
                    <button class="btn-export" id="bookmarkExportBtn">导出 CSV</button>
                </div>
                <div class="bookmark-list" id="bookmarkList">
                    <div class="bookmark-empty">暂无收藏，请在 Session 详情面板点击星标添加</div>
                </div>
            </div>
            <div class="bookmark-main">
                <div class="bookmark-chat-panel" id="bookmarkChatPanel">
                    <div class="empty-state">
                        <p>从左侧选择一条收藏查看对话</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="filterModal">
    <div class="modal">
        <div class="modal-header">
            <h3>编辑筛选条件</h3>
            <button class="modal-close" id="closeFilterModalBtn">×</button>
        </div>
        <div class="modal-body">
            <div class="toolbar-row">
                <select id="filterField" class="mini-select">
                    <option value="msg_count">消息数</option>
                    <option value="model">模型</option>
                    <option value="user_turns" class="analysis-option">用户轮次</option>
                    <option value="tool_fail_total" class="analysis-option">工具失败数</option>
                    <option value="tool_success_rate" class="analysis-option">工具成功率(%)</option>
                    <option value="tool_use_count" class="analysis-option">工具调用数</option>
                    <option value="duration_s" class="analysis-option">时长(s)</option>
                    <option value="api_errors" class="analysis-option">API错误数</option>
                    <option value="completed" class="analysis-option">完成状态</option>
                </select>
                <select id="filterOp" class="mini-select">
                    <option value=">=">>=</option>
                    <option value="<="><=</option>
                    <option value="contains">包含</option>
                    <option value="=">=</option>
                </select>
            </div>
            <div class="toolbar-row">
                <input id="filterValue" class="mini-input" type="text" placeholder="过滤值" />
                <button class="btn btn-green" id="applyFilterBtn">添加条件</button>
            </div>
            <div class="preset-row">
                <button class="preset-chip analysis-option" data-preset="high_turn_fail">高轮次异常</button>
                <button class="preset-chip analysis-option" data-preset="low_success">低成功率</button>
                <button class="preset-chip analysis-option" data-preset="heavy_tools">重工具调用</button>
                <button class="preset-chip analysis-option" data-preset="api_error">API异常</button>
            </div>
            <div class="filter-list" id="filterList"></div>
        </div>
        <div class="modal-footer">
            <div class="modal-hint">多条件按 AND 组合。分析页点击分布项后，也会把条件带到这里。</div>
            <div class="modal-actions">
                <button class="btn btn-ghost" id="closeFilterModalBtn2">关闭</button>
            </div>
        </div>
    </div>
</div>

<script>
// ----------------------------------------------------------------
// State
// ----------------------------------------------------------------
let allItems = [];
let filteredItems = [];
let activeEl  = null;
let activeItem = null;
let currentDir = null;
let availableDirs = [];
let currentView = 'sessions';
let currentFilters = [];
let currentSort = { field: 'tool_fail_total', order: 'desc' };
let analysisSummary = null;
let summaryData = null;
let favoritesSet = new Set(); // "dir_key||rel_path"
let favoritesData = []; // raw list from API

// Per-dir cache to avoid re-fetching on dataset switch
const _dirCache = {
    analysis: {},   // dir -> analysisSummary json
    summary: null,  // summary is global (all sources)
    analysisHtml: {},  // dir -> rendered HTML string
    summaryHtml: null, // rendered summary HTML string
};

const fileListEl  = document.getElementById('fileList');
const chatPanel   = document.getElementById('chatPanel');
const scrollBottomBtn = document.getElementById('scrollBottomBtn');
const statsChip   = document.getElementById('statsChip');
const searchInput = document.getElementById('searchInput');
const dirSelect   = document.getElementById('dirSelect');
const filterField = document.getElementById('filterField');
const filterOp = document.getElementById('filterOp');
const filterValue = document.getElementById('filterValue');
const applyFilterBtn = document.getElementById('applyFilterBtn');
const clearFilterBtn = document.getElementById('clearFilterBtn');
const executeSearchBtn = document.getElementById('executeSearchBtn');
const sortField = document.getElementById('sortField');
const sortOrder = document.getElementById('sortOrder');
const detailPanel = document.getElementById('detailPanel');
const detailBody = document.getElementById('detailBody');
const detailToggleBtn = document.getElementById('detailToggleBtn');
const navTabs = Array.from(document.querySelectorAll('.nav-tab'));
const presetChips = Array.from(document.querySelectorAll('.preset-chip[data-preset]'));
const analysisContent = document.getElementById('analysisContent');
const summaryView = document.getElementById('summaryView');
const filterSummary = document.getElementById('filterSummary');
const filterList = document.getElementById('filterList');
const filterPillList = document.getElementById('filterPillList');
const filterModal = document.getElementById('filterModal');
const openFilterModalBtn = document.getElementById('openFilterModalBtn');
const closeFilterModalBtn = document.getElementById('closeFilterModalBtn');
const closeFilterModalBtn2 = document.getElementById('closeFilterModalBtn2');

dirSelect.addEventListener('change', async () => {
    currentDir = dirSelect.value || null;
    activeEl = null;
    activeItem = null;
    analysisSummary = null;
    _renderEmptyChat();
    _renderDetailPanel(null);
    await loadList();
});

navTabs.forEach(tab => {
    tab.addEventListener('click', () => switchView(tab.dataset.view));
});

detailToggleBtn.addEventListener('click', () => {
    detailPanel.classList.toggle('collapsed');
    detailToggleBtn.textContent = detailPanel.classList.contains('collapsed') ? '←' : '→';
});

// Scroll-to-bottom floating button
chatPanel.addEventListener('scroll', () => {
    const gap = chatPanel.scrollHeight - chatPanel.scrollTop - chatPanel.clientHeight;
    scrollBottomBtn.style.display = gap > 200 ? 'flex' : 'none';
});
scrollBottomBtn.addEventListener('click', () => {
    chatPanel.scrollTo({ top: chatPanel.scrollHeight, behavior: 'smooth' });
});

openFilterModalBtn.addEventListener('click', () => {
    filterModal.classList.add('open');
});

closeFilterModalBtn.addEventListener('click', () => {
    filterModal.classList.remove('open');
});

closeFilterModalBtn2.addEventListener('click', () => {
    filterModal.classList.remove('open');
});

filterModal.addEventListener('click', (event) => {
    if (event.target === filterModal) {
        filterModal.classList.remove('open');
    }
});

applyFilterBtn.addEventListener('click', () => {
    const filter = {
        field: filterField.value,
        op: filterOp.value,
        value: filterValue.value.trim(),
        summary: `${filterField.options[filterField.selectedIndex].text} ${filterOp.options[filterOp.selectedIndex].text} ${filterValue.value.trim()}`.trim(),
    };
    if (!filter.value) return;
    currentFilters.push(filter);
    _renderFilterList();
    _renderFilterSummary();
});

clearFilterBtn.addEventListener('click', () => {
    currentFilters = [];
    filterValue.value = '';
    searchInput.value = '';
    _renderFilterList();
    _renderFilterSummary();
    executeSearch();
});

sortField.addEventListener('change', () => {
    currentSort.field = sortField.value;
});

sortOrder.addEventListener('change', () => {
    currentSort.order = sortOrder.value;
});

executeSearchBtn.addEventListener('click', () => {
    executeSearch();
});

presetChips.forEach(chip => {
    chip.addEventListener('click', () => {
        _applyPreset(chip.dataset.preset);
        executeSearch();
    });
});

analysisContent.addEventListener('click', (event) => {
    const row = event.target.closest('.dist-row.clickable');
    if (!row) return;
    const payload = row.dataset.filter;
    if (!payload) return;
    try {
        _setFilterFromAnalysis(JSON.parse(payload));
    } catch (e) {
        console.error('invalid analysis filter payload', e);
    }
});

// ----------------------------------------------------------------
// Load / Refresh
// ----------------------------------------------------------------
async function loadList() {
    fileListEl.innerHTML = '<div class="sidebar-tip"><span class="spinner"></span>加载中…</div>';
    try {
        await executeSearch();
        // Analysis 和 Summary 延迟到切换视图时加载，不在此触发
    } catch(e) {
        fileListEl.innerHTML = `<div class="sidebar-tip">加载失败：${esc(e.message)}</div>`;
    }
}

async function refreshList() {
    fileListEl.innerHTML = '<div class="sidebar-tip"><span class="spinner"></span>刷新中…</div>';
    // Clear all caches on manual refresh
    _dirCache.analysis = {};
    _dirCache.summary = null;
    _dirCache.analysisHtml = {};
    _dirCache.summaryHtml = null;
    try {
        await initConfig();
        await fetch('/api/refresh' + _dirQuery());
        await loadList();
    } catch(e) {
        fileListEl.innerHTML = `<div class="sidebar-tip">刷新失败：${esc(e.message)}</div>`;
    }
}

async function loadAnalysisSummary() {
    const cacheKey = currentDir || '__default__';
    // Use cached rendered HTML if available
    if (_dirCache.analysisHtml[cacheKey]) {
        analysisSummary = _dirCache.analysis[cacheKey];
        analysisContent.innerHTML = _dirCache.analysisHtml[cacheKey];
        return;
    }
    analysisContent.innerHTML = '<div class="analysis-empty"><span class="spinner"></span>分析数据加载中…</div>';
    try {
        // Use cached data if available, otherwise fetch
        if (_dirCache.analysis[cacheKey]) {
            analysisSummary = _dirCache.analysis[cacheKey];
        } else {
            const res = await fetch('/api/analysis/summary' + _dirQuery());
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            analysisSummary = await res.json();
            _dirCache.analysis[cacheKey] = analysisSummary;
        }
        renderAnalysis();
        _dirCache.analysisHtml[cacheKey] = analysisContent.innerHTML;
    } catch (e) {
        analysisSummary = null;
        analysisContent.innerHTML = `<div class="analysis-empty">分析数据加载失败：${esc(e.message)}</div>`;
    }
}

async function loadSummary() {
    // Summary is global (all sources), cache the rendered HTML
    if (_dirCache.summaryHtml) {
        summaryData = _dirCache.summary;
        summaryView.innerHTML = _dirCache.summaryHtml;
        return;
    }
    summaryView.innerHTML = '<div class="summary-empty"><span class="spinner"></span> Summary 加载中…</div>';
    try {
        if (_dirCache.summary) {
            summaryData = _dirCache.summary;
        } else {
            const res = await fetch('/api/summary');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            summaryData = await res.json();
            _dirCache.summary = summaryData;
        }
        renderSummary();
        _dirCache.summaryHtml = summaryView.innerHTML;
    } catch (e) {
        summaryData = null;
        summaryView.innerHTML = `<div class="summary-empty"><div class="empty-icon">⚠️</div><p>Summary 加载失败：${esc(e.message)}</p></div>`;
    }
}

// Search triggers on Enter key
searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') executeSearch();
});

let _lastHasAnalysis = null;
function _updateAnalysisOptions() {
    const hasAnalysis = allItems.some(item => item.analysis_available);
    if (hasAnalysis === _lastHasAnalysis) return;
    _lastHasAnalysis = hasAnalysis;
    document.querySelectorAll('.analysis-option').forEach(el => {
        el.style.display = hasAnalysis ? '' : 'none';
    });
    // Reset sort to msg_count if current sort field is hidden
    if (!hasAnalysis && sortField.value !== 'msg_count') {
        sortField.value = 'msg_count';
        currentSort.field = 'msg_count';
    }
}

async function executeSearch() {
    fileListEl.innerHTML = '<div class="sidebar-tip"><span class="spinner"></span>筛选中…</div>';

    const params = new URLSearchParams();
    if (currentDir) params.set('dir', currentDir);
    const q = searchInput.value.trim();
    if (q) params.set('q', q);
    if (currentFilters.length) params.set('filters', JSON.stringify(currentFilters));
    if (currentSort.field) params.set('sort_field', currentSort.field);
    if (currentSort.order) params.set('sort_order', currentSort.order);

    try {
        const res = await fetch('/api/list?' + params.toString());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        allItems = data.items;
        _lastHasAnalysis = null;
        filteredItems = allItems;
    } catch (e) {
        fileListEl.innerHTML = `<div class="sidebar-tip">筛选失败：${esc(e.message)}</div>`;
        return;
    }

    _updateAnalysisOptions();

    fileListEl.innerHTML = '';
    const frag = document.createDocumentFragment();
    filteredItems.forEach(item => frag.appendChild(_makeItemEl(item)));
    fileListEl.appendChild(frag);

    statsChip.style.display = 'inline';
    statsChip.textContent = `${filteredItems.length} 条对话`;
    _renderFilterSummary();
    _renderFilterList();
}

function _dirQuery() {
    if (!currentDir) return '';
    return `?dir=${encodeURIComponent(currentDir)}`;
}

async function initConfig() {
    const res = await fetch('/api/config');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const config = await res.json();
    availableDirs = Array.isArray(config.dirs) ? config.dirs : [];
    const prevDir = currentDir;

    if (availableDirs.length > 1) {
        dirSelect.innerHTML = '';
        availableDirs.forEach(dir => {
            const opt = document.createElement('option');
            opt.value = dir.key;
            opt.textContent = dir.label;
            dirSelect.appendChild(opt);
        });
        currentDir = availableDirs.some(dir => dir.key === prevDir)
            ? prevDir
            : (config.active_dir || availableDirs[0].key);
        dirSelect.value = currentDir;
        dirSelect.style.display = 'inline-block';
    } else if (availableDirs.length === 1) {
        currentDir = availableDirs[0].key;
        dirSelect.style.display = 'none';
    } else {
        currentDir = null;
        dirSelect.style.display = 'none';
    }
}

function _makeItemEl(item) {
    const el = document.createElement('div');
    el.className = 'file-item';
    if (activeItem && activeItem.rel_path === item.rel_path && activeItem.dir_key === item.dir_key) {
        el.classList.add('active');
        activeEl = el;
    }
    el.innerHTML = `
        <div class="file-item-label">${esc(item.label_short || '(空)')}</div>
        <div class="file-item-meta">${item.msg_count} 条${item.model ? ' · ' + esc(item.model) : ''}</div>
        ${item.analysis_available ? `<div class="metric-row">
            ${_metricPill(`轮次 ${fmtMetric(item.user_turns, '-')}`)}
            ${_metricPill(`工具 ${fmtMetric(item.tool_use_count, '-')}`)}
            ${_metricPill(`失败 ${fmtMetric(item.tool_fail_total, '-')}`, (item.tool_fail_total || 0) > 0 ? 'danger' : '')}
            ${_metricPill(`成功率 ${fmtPercent(item.tool_success_rate)}`, item.tool_success_rate == null ? '' : (item.tool_success_rate < 70 ? 'warn' : 'success'))}

// ----------------------------------------------------------------
// Select item → load file
// ----------------------------------------------------------------
async function selectItem(item, el) {
    if (activeEl) activeEl.classList.remove('active');
    el.classList.add('active');
    activeEl = el;
    activeItem = item;
    _renderDetailPanel(item);

    chatPanel.innerHTML = '<div class="empty-state"><span class="spinner"></span><p>加载中…</p></div>';
    try {
        const params = new URLSearchParams({ rel_path: item.rel_path });
        if (item.dir_key) params.set('dir', item.dir_key);
        const res = await fetch('/api/file?' + params.toString());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        renderMessages(await res.json(), item.rel_path, item.label_short);
    } catch(e) {
        showError('加载失败：' + e.message);
    }
}

// ----------------------------------------------------------------
// Render messages
// ----------------------------------------------------------------
function extractMessages(data) {
    if (data && Array.isArray(data.messages)) return data.messages;
    if (Array.isArray(data) && data.length && data[0].role) return data;
    return null;
}

function renderMessages(data, relPath, label) {
    chatPanel.innerHTML = '';
    const messages = extractMessages(data);
    if (!messages) { showError('未找到 messages 字段'); return; }
    if (!messages.length) { showError('messages 为空'); return; }

    const model  = data.model || data.request?.model;
    const temp   = data.temperature ?? data.request?.temperature;
    const maxTok = data.max_tokens   ?? data.request?.max_tokens;

    const meta = document.createElement('div');
    meta.className = 'metadata';
    meta.innerHTML = `
        <div class="metadata-title">📋 对话信息</div>
        ${model  ? `<div class="metadata-item"><strong>模型</strong><span>${esc(model)}</span></div>` : ''}
        ${temp  !== undefined ? `<div class="metadata-item"><strong>Temperature</strong><span>${temp}</span></div>` : ''}
        ${maxTok ? `<div class="metadata-item"><strong>Max Tokens</strong><span>${maxTok}</span></div>` : ''}
        <div class="metadata-item"><strong>消息数</strong><span>${messages.length} 条</span></div>
        <div class="metadata-item"><strong>路径</strong><span style="font-size:12px;font-family:monospace">${esc(relPath)}</span></div>
    `;
    chatPanel.appendChild(meta);

    messages.forEach(msg => {
        const role = msg.role || 'unknown';

        // system prompt: render as standalone collapsible, not a chat bubble
        if (role === 'system') {
            chatPanel.appendChild(renderSystemPrompt(msg.content));
            return;
        }

        let blocks = [];

        if (role === 'tool') {
            blocks = [{ type: '_oai_tool_result', tool_call_id: msg.tool_call_id, content: msg.content }];
        } else if (msg.tool_calls && Array.isArray(msg.tool_calls)) {
            // content 可能是 string 或 block 数组
            if (Array.isArray(msg.content)) {
                blocks.push(...msg.content);
            } else if (msg.content) {
                blocks.push({ type: 'text', text: msg.content });
            }
            msg.tool_calls.forEach(tc => blocks.push({ type: '_oai_tool_call', tool_call: tc }));
        } else if (Array.isArray(msg.content)) {
            blocks = msg.content;
        } else {
            blocks = [{ type: 'text', text: typeof msg.content === 'string'
                ? msg.content
                : JSON.stringify(msg.content, null, 2) }];
        }

        // top-level reasoning_content (OpenAI o-series)
        if (msg.reasoning_content) {
            blocks = [{ type: 'thinking', thinking: msg.reasoning_content }, ...blocks];
        }

        const displayRole = role === 'tool' ? 'user' : role;
        const row  = document.createElement('div');
        row.className = `msg-row ${displayRole}`;

        const avatar = document.createElement('div');
        avatar.className = `avatar ${displayRole}`;
        avatar.textContent = displayRole === 'user' ? '👤' : '🤖';

        const col = document.createElement('div');
        col.className = 'msg-bubble-col';
        blocks.forEach(b => { const el = renderBlock(b); if (el) col.appendChild(el); });

        if (displayRole === 'user') {
            row.appendChild(avatar); row.appendChild(col);
        } else {
            row.appendChild(col); row.appendChild(avatar);
        }
        chatPanel.appendChild(row);
    });
}

function switchView(view) {
    currentView = view;
    document.querySelectorAll('.view').forEach(el => el.classList.toggle('active', el.id === `${view}View`));
    navTabs.forEach(tab => tab.classList.toggle('active', tab.dataset.view === view));
    if (view === 'analysis') {
        loadAnalysisSummary();

    if (view === 'summary') {

    }
    if (view === 'bookmark') {
        loadBookmark();
    }

function renderDetailMap(obj) {
    const entries = Object.entries(obj || {});
    if (!entries.length) return '<div class="detail-empty">无失败工具明细</div>';

        `<div class="detail-list-item"><code>${esc(k)}</code><strong>${esc(v)}</strong></div>`).join('')}</div>`;
}

function fmtMetric(value, fallback='-') {
    return value == null || value === '' ? fallback : String(value);
}

function fmtPercent(value) {
    return value == null || value === '' ? '-' : `${value}%`;
}

function fmtDuration(value) {
    if (value == null || value === '') return '-';
    const sec = Number(value);
    if (Number.isNaN(sec)) return String(value);
    if (sec < 60) return `${Math.round(sec)}s`;
    if (sec < 3600) return `${(sec / 60).toFixed(1)}min`;
    return `${(sec / 3600).toFixed(1)}h`;
}

function _setFilterFromAnalysis(filter) {
    currentFilters = [filter];
    if (filter.field && Array.from(filterField.options).some(opt => opt.value === filter.field)) {
        filterField.value = filter.field;
    }
    if (['>=', '<=', 'contains', '='].includes(filter.op)) {
        filterOp.value = filter.op;
        filterValue.value = filter.value ?? '';
    } else if (filter.op === 'range') {
        filterOp.value = '>=';
        filterValue.value = filter.summary || '';
    } else if (filter.op === 'map_has_key') {
        filterOp.value = 'contains';
        filterValue.value = filter.key || '';
    }
    switchView('sessions');
    executeSearch();
}

function _renderFilterSummary() {
    if (!currentFilters.length) {
        filterSummary.classList.remove('active');
        filterSummary.textContent = '';
        return;
    }
    const summary = currentFilters.map(filter =>
        filter.summary || `${filter.field} ${filter.op} ${filter.value ?? ''}`.trim()
    ).join(' AND ');
    filterSummary.classList.add('active');
    filterSummary.innerHTML = `<strong>当前筛选：</strong>${esc(summary)}`;
}

function _renderFilterList() {
    if (!currentFilters.length) {
        filterList.innerHTML = '';
        filterPillList.innerHTML = '<span class="detail-empty">未设置筛选条件</span>';
        return;
    }
    filterList.innerHTML = currentFilters.map((filter, idx) => `
        <div class="filter-chip">
            <span>${esc(filter.summary || `${filter.field} ${filter.op} ${filter.value ?? ''}`.trim())}</span>
            <button type="button" data-filter-index="${idx}">移除</button>
        </div>
    `).join('');
    filterList.querySelectorAll('button[data-filter-index]').forEach(btn => {
        btn.addEventListener('click', () => {
            const idx = Number(btn.dataset.filterIndex);
            currentFilters.splice(idx, 1);

            _renderFilterSummary();

    filterPillList.innerHTML = currentFilters.map((filter, idx) => `
        <span class="filter-pill">
            <span>${esc(filter.summary || `${filter.field} ${filter.op} ${filter.value ?? ''}`.trim())}</span>
            <button type="button" data-pill-index="${idx}">×</button>
        </span>
    `).join('');
    filterPillList.querySelectorAll('button[data-pill-index]').forEach(btn => {
        btn.addEventListener('click', () => {

            _renderFilterSummary();

}

function renderSummary() {
    if (!summaryData) {
        summaryView.innerHTML = '<div class="summary-empty"><div class="empty-icon">📊</div><p>暂无 Summary 数据</p></div>';
        return;
    }
    const sources = Array.isArray(summaryData.sources) ? summaryData.sources : [];
    if (!sources.length) {
        summaryView.innerHTML = '<div class="summary-empty"><div class="empty-icon">📭</div><p>暂无可用的数据源</p></div>';
        return;
    }
    const totalSessions = sources.reduce((acc, s) => acc + (s.total_sessions || 0), 0);
    const totalAnalysis = sources.reduce((acc, s) => acc + (s.analysis_sessions || 0), 0);
    const totalPassed = sources.reduce((acc, s) => acc + (s.quality_passed || 0), 0);
    const totalSkills = new Set(sources.flatMap(s => Object.keys(s.skills_detail || {}))).size || sources.reduce((max, s) => Math.max(max, s.total_skills || 0), 0);
    const successRates = sources.map(s => s.success_rate).filter(v => v != null);
    const toolRates = sources.map(s => s.avg_tool_success_rate).filter(v => v != null);
    const avgSuccess = successRates.length ? (successRates.reduce((a, b) => a + b, 0) / successRates.length).toFixed(1) + '%' : 'N/A';
    const avgTool = toolRates.length ? (toolRates.reduce((a, b) => a + b, 0) / toolRates.length).toFixed(1) + '%' : 'N/A';

    const hasAnyAnalysis = totalAnalysis > 0;

    summaryView.innerHTML = `

function renderKpiCard(label, value, note='', icon='📊', color='blue') {
    return `
        <div class="kpi-card">
            <div class="kpi-icon ${color}">${icon}</div>
            <div class="kpi-body">
                <div class="kpi-label">${esc(label)}</div>
                <div class="kpi-value">${esc(value ?? '-')}</div>
                <div class="kpi-note">${esc(note)}</div>
            </div>
        </div>
    `;
}

function renderRateBar(value, color='blue') {
    if (value == null) return '<span class="detail-empty">N/A</span>';
    const pct = Math.max(0, Math.min(100, Number(value)));
    const cls = color === 'green' ? 'bar-green' : 'bar-blue';
    return `
        <div class="rate-bar">
            <div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
            <span class="bar-pct">${esc(value)}%</span>
        </div>
    `;
}

function renderDistCard(title, rows, withPct=true, filterKind='', icon='📊', barColor='bar-teal') {
    const safeRows = Array.isArray(rows) ? rows : [];
    return `
        <div class="chart-card">
            <div class="chart-card-header">
                <span class="chart-icon">${icon}</span>
                <h3>${esc(title)}</h3>
            </div>
            <div class="chart-card-body">
                ${safeRows.length ? `<div class="dist-list">${safeRows.map(row => renderDistRow(row, withPct, filterKind, barColor)).join('')}</div>` : '<div class="detail-empty">暂无数据</div>'}
            </div>
        </div>
    `;
}

function renderDistRow(row, withPct=true, filterKind='', barColor='bar-teal') {
    const pct = Number(row.pct || 0);
    const barWidth = Math.max(0, Math.min(100, withPct ? pct : Math.min(Number(row.count || 0), 100)));
    const right = withPct ? `${row.count} · ${pct}%` : `${row.count}`;
    const filter = buildAnalysisFilter(filterKind, row);
    const clickable = !!filter;
    return `
        <div class="dist-row${clickable ? ' clickable' : ''}" ${clickable ? `data-filter="${escAttr(JSON.stringify(filter))}"` : ''}>
            <strong>${esc(row.label ?? '-')}</strong>
            <div class="dist-bar"><div class="dist-bar-fill ${barColor}" style="width:${barWidth}%"></div></div>
            <div class="dist-value">${esc(right)}</div>
        </div>
    `;
}

function buildAnalysisFilter(kind, row) {
    if (!kind || !row || !row.label) return null;
    const label = String(row.label);
    if (kind === 'user_turns') {
        if (label === '1') return { field: 'user_turns', op: '=', value: '1', summary: '用户轮次 = 1' };
        if (label === '2-3') return { field: 'user_turns', op: 'range', min: 2, max: 4, summary: '用户轮次 ∈ [2, 3]' };
        if (label === '4-7') return { field: 'user_turns', op: 'range', min: 4, max: 8, summary: '用户轮次 ∈ [4, 7]' };
        if (label === '8-15') return { field: 'user_turns', op: 'range', min: 8, max: 16, summary: '用户轮次 ∈ [8, 15]' };
        if (label === '>15') return { field: 'user_turns', op: '>=', value: '16', summary: '用户轮次 >= 16' };
    }
    if (kind === 'tool_use_count') {
        if (label === '1-5') return { field: 'tool_use_count', op: 'range', min: 1, max: 6, summary: '工具调用数 ∈ [1, 5]' };
        if (label === '6-15') return { field: 'tool_use_count', op: 'range', min: 6, max: 16, summary: '工具调用数 ∈ [6, 15]' };
        if (label === '16-30') return { field: 'tool_use_count', op: 'range', min: 16, max: 31, summary: '工具调用数 ∈ [16, 30]' };
        if (label === '31-50') return { field: 'tool_use_count', op: 'range', min: 31, max: 51, summary: '工具调用数 ∈ [31, 50]' };
        if (label === '>50') return { field: 'tool_use_count', op: '>=', value: '51', summary: '工具调用数 >= 51' };
    }
    if (kind === 'tool_success_rate') {
        if (label === '0-50%') return { field: 'tool_success_rate', op: 'range', min: 0, max: 50, summary: '工具成功率 ∈ [0, 50%)' };
        if (label === '50-80%') return { field: 'tool_success_rate', op: 'range', min: 50, max: 80, summary: '工具成功率 ∈ [50, 80%)' };
        if (label === '80-95%') return { field: 'tool_success_rate', op: 'range', min: 80, max: 95, summary: '工具成功率 ∈ [80, 95%)' };
        if (label === '95-99%') return { field: 'tool_success_rate', op: 'range', min: 95, max: 100, summary: '工具成功率 ∈ [95, 100)' };
        if (label === '100%') return { field: 'tool_success_rate', op: '=', value: '100.0', summary: '工具成功率 = 100%' };
    }
    if (kind === 'duration_s') {
        if (label === '<1min') return { field: 'duration_s', op: 'range', min: 0, max: 60, summary: '时长 < 1min' };
        if (label === '1-5min') return { field: 'duration_s', op: 'range', min: 60, max: 300, summary: '时长 ∈ [1, 5min)' };
        if (label === '5-15min') return { field: 'duration_s', op: 'range', min: 300, max: 900, summary: '时长 ∈ [5, 15min)' };
        if (label === '15-30min') return { field: 'duration_s', op: 'range', min: 900, max: 1800, summary: '时长 ∈ [15, 30min)' };
        if (label === '>30min') return { field: 'duration_s', op: '>=', value: '1800', summary: '时长 >= 30min' };
    }
    if (kind === 'model') return { field: 'model', op: '=', value: label, summary: `模型 = ${label}` };
    if (kind === 'completed') return { field: 'completed', op: '=', value: label, summary: `完成状态 = ${label}` };
    if (kind === 'tool_fail_detail') return { field: 'tool_fail_detail', op: 'map_has_key', key: label, summary: `失败工具包含 ${label}` };
    return null;
}

// ----------------------------------------------------------------
// Block renderers
// ----------------------------------------------------------------
function renderBlock(block) {
    switch (block.type) {
        case 'text':             return renderTextBlock(block);
        case 'thinking':         return renderReasoningBlock(block.thinking || block.text || '');
        case 'tool_use':         return renderToolUseBlock(block);
        case 'tool_result':      return renderToolResultBlock(block);
        case '_oai_tool_call':   return renderOaiToolCallBlock(block);
        case '_oai_tool_result': return renderOaiToolResultBlock(block);
        default:                 return renderFallbackBlock(block);
    }
}

function renderTextBlock(block) {
    const el = document.createElement('div');
    el.className = 'block text';
    el.textContent = block.text || '';
    return el;
}

function renderReasoningBlock(text) {
    if (!text) return null;
    const el = document.createElement('div');
    el.className = 'block reasoning';

    const summary = document.createElement('div');
    summary.className = 'reasoning-summary';
    const chevron = document.createElement('span');
    chevron.className = 'reasoning-chevron';  // 默认展开，无 collapsed
    chevron.textContent = '▼';
    const lbl = document.createElement('span');
    lbl.textContent = '🧠 思考过程';
    const cnt = document.createElement('span');
    cnt.style.cssText = 'font-size:11px;color:#a78bfa;font-weight:400';
    cnt.textContent = `(${text.length} 字符)`;
    summary.append(chevron, lbl, cnt);

    const body = document.createElement('div');
    body.className = 'reasoning-body';  // 默认展开
    body.textContent = text;

    summary.addEventListener('click', () => {
        const c = body.classList.toggle('collapsed');
        chevron.classList.toggle('collapsed', c);
    });

    el.append(summary, body);
    return el;
}

function renderSystemPrompt(content) {
    const text = typeof content === 'string'
        ? content
        : JSON.stringify(content, null, 2);

    const el = document.createElement('div');
    el.className = 'block system-prompt';
    el.style.marginBottom = '16px';

    const summary = document.createElement('div');
    summary.className = 'system-summary';
    const chevron = document.createElement('span');
    chevron.className = 'system-chevron collapsed';  // 默认折叠
    chevron.textContent = '▼';
    const lbl = document.createElement('span');
    lbl.textContent = '⚙️ System Prompt';
    const cnt = document.createElement('span');
    cnt.className = 'system-char-count';
    cnt.textContent = `(${text.length} 字符)`;
    summary.append(chevron, lbl, cnt);

    const body = document.createElement('div');
    body.className = 'system-body collapsed';  // 默认折叠
    body.textContent = text;

    summary.addEventListener('click', () => {
        const c = body.classList.toggle('collapsed');
        chevron.classList.toggle('collapsed', c);
    });

    el.append(summary, body);
    return el;
}

function renderToolUseBlock(block) {
    const el  = document.createElement('div');
    el.className = 'block tool-use';
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `<span class="badge badge-tool-use">tool_use</span>
        <span class="tool-name">${esc(block.name||'')}</span>
        <span class="tool-id">${esc(block.id||'')}</span>`;
    el.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'block-body';
    const input = block.input || {};
    if (input.command !== undefined) {
        const lbl = document.createElement('div');
        lbl.className = 'cmd-label'; lbl.textContent = '$ command';
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre'; pre.textContent = input.command;
        body.append(lbl, pre);
        const others = Object.entries(input).filter(([k]) => k !== 'command');
        if (others.length) body.appendChild(renderKV(others));
    } else if (Object.keys(input).length) {
        body.appendChild(renderKV(Object.entries(input)));
    } else {
        body.textContent = '(no input)';
    }
    el.appendChild(body);
    return el;
}

function renderToolResultBlock(block) {
    const isError = block.is_error;
    const el = document.createElement('div');
    el.className = `block tool-result${isError ? ' is-error' : ''}`;
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `<span class="badge ${isError ? 'badge-error' : 'badge-tool-result'}">${isError ? 'error' : 'tool_result'}</span>
        <span class="tool-id">${esc(block.tool_use_id||'')}</span>`;
    el.appendChild(hdr);
    const body = document.createElement('div');
    body.className = 'block-body';
    const pre = document.createElement('pre');
    pre.className = `result-pre${isError ? ' is-error' : ''}`;
    const raw = block.content;
    pre.textContent = typeof raw === 'string' ? raw : JSON.stringify(raw, null, 2);
    body.appendChild(pre);
    el.appendChild(body);
    return el;
}

function renderOaiToolCallBlock(block) {
    const tc = block.tool_call || {};
    const fn = tc.function || {};
    const el = document.createElement('div');
    el.className = 'block tool-use';
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr';
    hdr.innerHTML = `<span class="badge badge-tool-use">tool_call</span>
        <span class="tool-name">${esc(fn.name||'')}</span>
        <span class="tool-id">${esc(tc.id||'')}</span>`;
    el.appendChild(hdr);
    const body = document.createElement('div');
    body.className = 'block-body';
    let parsed = null;
    try { parsed = JSON.parse(fn.arguments); } catch(e) {}
    if (parsed && parsed.command !== undefined) {
        const lbl = document.createElement('div');
        lbl.className = 'cmd-label'; lbl.textContent = '$ command';
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre'; pre.textContent = parsed.command;
        body.append(lbl, pre);
        const others = Object.entries(parsed).filter(([k]) => k !== 'command');
        if (others.length) body.appendChild(renderKV(others));
    } else if (parsed && typeof parsed === 'object') {
        body.appendChild(renderKV(Object.entries(parsed)));
    } else {
        const pre = document.createElement('pre');
        pre.className = 'cmd-pre';
        let args = fn.arguments || '';
        try { args = JSON.stringify(JSON.parse(args), null, 2); } catch(e) {}
        pre.textContent = args;
        body.appendChild(pre);
    }
    el.appendChild(body);
    return el;
}

function renderOaiToolResultBlock(block) {
    const el = document.createElement('div');
    el.className = 'block tool-role';
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr tool-role-hdr';
    hdr.innerHTML = `<span class="badge badge-tool-role">tool_result</span>
        <span class="tool-id">${esc(block.tool_call_id||'')}</span>`;
    el.appendChild(hdr);
    const body = document.createElement('div');
    body.className = 'block-body';
    const pre = document.createElement('pre');
    pre.className = 'result-pre';
    pre.textContent = typeof block.content === 'string'
        ? block.content
        : JSON.stringify(block.content, null, 2);
    body.appendChild(pre);
    el.appendChild(body);
    return el;
}

function renderFallbackBlock(block) {
    const el = document.createElement('div');
    el.className = 'block text';
    el.textContent = JSON.stringify(block, null, 2);
    return el;
}

// ----------------------------------------------------------------
// Helpers
// ----------------------------------------------------------------
function renderKV(entries) {
    const wrap = document.createElement('div');
    wrap.className = 'input-kv';
    entries.forEach(([k, v]) => {
        const row = document.createElement('div');
        row.className = 'kv-row';
        const kEl = document.createElement('span');
        kEl.className = 'kv-key'; kEl.textContent = k + ':';
        const vEl = document.createElement('span');
        vEl.className = 'kv-val';
        vEl.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
        row.append(kEl, vEl);
        wrap.appendChild(row);
    });
    return wrap;
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showError(msg) {
    chatPanel.innerHTML = `<div class="error-box"><strong>错误：</strong>${esc(msg)}</div>`;
}

function _favKey(dirKey, relPath) { return dirKey + '||' + relPath; }

async function loadFavorites() {
    try {
        const res = await fetch('/api/favorites');
        if (!res.ok) return;
        favoritesData = await res.json();
        favoritesSet = new Set(favoritesData.map(f => _favKey(f.dir_key, f.rel_path)));
    } catch (e) { console.warn('loadFavorites failed', e); }
}

async function toggleFavorite(item) {
    const key = _favKey(item.dir_key, item.rel_path);
    const isFav = favoritesSet.has(key);
    const url = isFav ? '/api/favorites/remove' : '/api/favorites/add';
    try {
        await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                dir_key: item.dir_key,
                rel_path: item.rel_path,
                label_short: item.label_short || '',
                model: item.model || '',
                msg_count: item.msg_count || 0,
                session: item.session || '',
                dir_label: item.dir_label || '',
            }),
        });
        if (isFav) { favoritesSet.delete(key); } else { favoritesSet.add(key); }
        _renderDetailPanel(item);
        // Refresh favorites data
        await loadFavorites();
    } catch (e) { console.error('toggleFavorite failed', e); }
}
