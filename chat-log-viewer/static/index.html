const bookmarkChatPanel = document.getElementById('bookmarkChatPanel');
const bookmarkSearch = document.getElementById('bookmarkSearch');
const bookmarkCount = document.getElementById('bookmarkCount');
const bookmarkExportBtn = document.getElementById('bookmarkExportBtn');
let bookmarkActiveEl = null;

bookmarkSearch.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') renderBookmarkList();
});

bookmarkExportBtn.addEventListener('click', () => {

});

async function loadBookmark() {

}

function renderBookmarkList() {
    const q = (bookmarkSearch.value || '').trim().toLowerCase();
    let items = favoritesData;
    if (q) {
        items = items.filter(f =>
            (f.label_short || '').toLowerCase().includes(q) ||
            (f.dir_label || '').toLowerCase().includes(q) ||
            (f.rel_path || '').toLowerCase().includes(q)
        );
    }
    bookmarkCount.textContent = `${items.length} 条收藏`;
    if (!items.length) {
        bookmarkList.innerHTML = '<div class="bookmark-empty">暂无收藏，请在 Session 详情面板点击星标添加</div>';
        return;
    }
    bookmarkList.innerHTML = '';
    const frag = document.createDocumentFragment();
    items.forEach(fav => {
        const el = document.createElement('div');
        el.className = 'bookmark-item';
        el.innerHTML = `
            <div class="bookmark-item-actions">
                <button class="bookmark-remove-btn" title="移除收藏">✕</button>
            </div>
            <div class="bookmark-item-label">${esc(fav.label_short || '(空)')}</div>
            <div class="bookmark-item-meta">${fav.msg_count || 0} 条${fav.model ? ' · ' + esc(fav.model) : ''}</div>
            <span class="bookmark-item-source">${esc(fav.dir_label || fav.dir_key || '')}</span>
        `;
        el.querySelector('.bookmark-remove-btn').addEventListener('click', async (e) => {
            e.stopPropagation();
            await fetch('/api/favorites/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dir_key: fav.dir_key, rel_path: fav.rel_path }),
            });
            await loadFavorites();
            renderBookmarkList();
            // Update detail panel star if same item
            if (activeItem) _renderDetailPanel(activeItem);
        });
        el.addEventListener('click', () => {
            if (bookmarkActiveEl) bookmarkActiveEl.classList.remove('active');
            el.classList.add('active');
            bookmarkActiveEl = el;
            loadBookmarkChat(fav);
        });
        frag.appendChild(el);
    });
    bookmarkList.appendChild(frag);
}

async function loadBookmarkChat(fav) {
    bookmarkChatPanel.innerHTML = '<div class="empty-state"><span class="spinner"></span><p>加载中…</p></div>';
    try {
        const params = new URLSearchParams({ rel_path: fav.rel_path });
        if (fav.dir_key) params.set('dir', fav.dir_key);
        const res = await fetch('/api/file?' + params.toString());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        // Reuse renderMessages but target bookmarkChatPanel
        const data = await res.json();
        const savedPanel = chatPanel;
        // Temporarily swap chatPanel reference for renderMessages
        const realChatPanel = chatPanel;
        // We'll render manually to bookmarkChatPanel
        renderMessagesToChatPanel(bookmarkChatPanel, data, fav.rel_path, fav.label_short || '');
    } catch (e) {
        bookmarkChatPanel.innerHTML = `<div class="error-box"><strong>错误：</strong>${esc(e.message)}</div>`;
    }
}

function renderMessagesToChatPanel(panel, data, relPath, label) {
    panel.innerHTML = '';
    const messages = extractMessages(data);
    if (!messages) { panel.innerHTML = '<div class="error-box">未找到 messages 字段</div>'; return; }
    if (!messages.length) { panel.innerHTML = '<div class="error-box">messages 为空</div>'; return; }

    const model  = data.model || data.request?.model;
    const temp   = data.temperature ?? data.request?.temperature;
    const maxTok = data.max_tokens   ?? data.request?.max_tokens;

    const meta = document.createElement('div');
    meta.className = 'metadata';
    meta.innerHTML = `
        <div class="metadata-title">📋 对话信息</div>
        ${model  ? `<div class="metadata-item"><strong>模型</strong><span>${esc(model)}</span></div>` : ''}
        ${temp  !== undefined ? `<div class="metadata-item"><strong>Temperature</strong><span>${temp}</span></div>` : ''}
        ${maxTok ? `<div class="metadata-item"><strong>Max Tokens</strong><span>${maxTok}</span></div>` : ''}
        <div class="metadata-item"><strong>消息数</strong><span>${messages.length} 条</span></div>
        <div class="metadata-item"><strong>路径</strong><span style="font-size:12px;font-family:monospace">${esc(relPath)}</span></div>
    `;
    panel.appendChild(meta);

    messages.forEach(msg => {
        const role = msg.role || 'unknown';
        if (role === 'system') { panel.appendChild(renderSystemPrompt(msg.content)); return; }
        let blocks = [];
        if (role === 'tool') {
            blocks = [{ type: '_oai_tool_result', tool_call_id: msg.tool_call_id, content: msg.content }];
        } else if (msg.tool_calls && Array.isArray(msg.tool_calls)) {
            if (Array.isArray(msg.content)) { blocks.push(...msg.content); }
            else if (msg.content) { blocks.push({ type: 'text', text: msg.content }); }
            msg.tool_calls.forEach(tc => blocks.push({ type: '_oai_tool_call', tool_call: tc }));
        } else if (Array.isArray(msg.content)) {
            blocks = msg.content;
        } else {
            blocks = [{ type: 'text', text: typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content, null, 2) }];
        }
        if (msg.reasoning_content) { blocks = [{ type: 'thinking', thinking: msg.reasoning_content }, ...blocks]; }
        const displayRole = role === 'tool' ? 'user' : role;
        const row = document.createElement('div');
        row.className = `msg-row ${displayRole}`;
        const avatar = document.createElement('div');
        avatar.className = `avatar ${displayRole}`;
        avatar.textContent = displayRole === 'user' ? '👤' : '🤖';
        const col = document.createElement('div');
        col.className = 'msg-bubble-col';
        blocks.forEach(b => { const el = renderBlock(b); if (el) col.appendChild(el); });
        if (displayRole === 'user') { row.appendChild(avatar); row.appendChild(col); }
        else { row.appendChild(col); row.appendChild(avatar); }
        panel.appendChild(row);
    });
}

// ----------------------------------------------------------------
// Init
// ----------------------------------------------------------------
(async function init() {
    try {
        await initConfig();
        await loadFavorites();
        await loadList();
    } catch (e) {
        fileListEl.innerHTML = `<div class="sidebar-tip">初始化失败：${esc(e.message)}</div>`;
    }
})();
</script>
</body>
</html>
