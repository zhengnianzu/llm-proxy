<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Session Manager{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
         font-size: 14px; color: #1a1a2e; background: #f4f6fb; }
  .page { max-width: 1200px; margin: 32px auto; padding: 0 20px 60px; }
  .header { background: linear-gradient(135deg, #1f4e79 0%, #2e75b6 100%);
    color: #fff; border-radius: 10px; padding: 28px 36px; margin-bottom: 28px; }
  .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .header .meta { font-size: 13px; opacity: .8; }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.07);
          padding: 24px 28px; margin-bottom: 22px; }
  .card h2 { font-size: 16px; color: #1f4e79; border-left: 4px solid #2e75b6;
             padding-left: 10px; margin-bottom: 16px; }
  .kpi-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
  .kpi { flex: 1 1 140px; background: #f0f5ff; border-radius: 8px;
         padding: 14px 16px; text-align: center; }
  .kpi .val { font-size: 26px; font-weight: 700; color: #1f4e79; }
  .kpi .lbl { font-size: 11px; color: #888; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #1f4e79; color: #fff; padding: 10px 14px; text-align: left; font-weight: 600; }
  td { padding: 9px 14px; border-bottom: 1px solid #eef0f5; }
  tr:nth-child(even) td { background: #f7f9fd; }
  tr:hover td { background: #edf3fb; }
  .rate-bar { display: flex; align-items: center; gap: 8px; }
  .bar-wrap { flex: 1; background: #e8edf5; border-radius: 3px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #34c759, #5ae075); }
  .bar-pct { font-size: 11px; color: #666; min-width: 44px; text-align: right; }
  a.link { color: #2e75b6; text-decoration: none; font-weight: 600; }
  a.link:hover { text-decoration: underline; }
  a.back { color: #2e75b6; text-decoration: none; font-weight: 600; margin-bottom: 16px; display: inline-block; }
  a.back:hover { text-decoration: underline; }
  .r { text-align: right; }
</style>
</head>
<body>
<div class="page">
{% block content %}{% endblock %}
</div>
</body>
</html>
