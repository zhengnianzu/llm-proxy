<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Session Manager{% endblock %}</title>
<style>
  :root {
    --bg: #f3efe7;
    --bg-accent: #efe6d6;
    --surface: rgba(255, 252, 247, 0.88);
    --surface-strong: #fffdfa;
    --text: #241f1a;
    --muted: #6f655a;
    --line: rgba(92, 72, 48, 0.14);
    --line-strong: rgba(92, 72, 48, 0.22);
    --primary: #1d4f45;
    --primary-soft: #dfece8;
    --accent: #cb6a38;
    --accent-soft: #f6e4d7;
    --success: #2f8f63;
    --shadow: 0 18px 50px rgba(56, 39, 21, 0.08);
    --radius-lg: 24px;
    --radius-md: 18px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 32%),
      radial-gradient(circle at top right, rgba(203, 106, 56, 0.10), transparent 24%),
      linear-gradient(180deg, var(--bg-accent) 0%, var(--bg) 22%, #f8f4ed 100%);
  }

  .page {
    max-width: 1240px;
    margin: 0 auto;
    padding: 40px 24px 72px;
  }

  .header {
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(135deg, rgba(29, 79, 69, 0.98) 0%, rgba(42, 95, 82, 0.95) 54%, rgba(203, 106, 56, 0.92) 100%);
    color: #fffdf8;
    border-radius: var(--radius-lg);
    padding: 32px 36px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .header::after {
    content: "";
    position: absolute;
    inset: auto -60px -90px auto;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
  }

  .header h1 {
    position: relative;
    font-size: 30px;
    line-height: 1.15;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }

  .header .meta {
    position: relative;
    font-size: 13px;
    color: rgba(255, 253, 248, 0.78);
  }

  .card {
    background: var(--surface);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.55);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    padding: 24px 26px;
    margin-bottom: 20px;
  }

  .card h2 {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    color: var(--primary);
    margin-bottom: 18px;
  }

  .card h2::before {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), #e0a44d);
    box-shadow: 0 0 0 6px var(--accent-soft);
  }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
  }

  .kpi {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.5));
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    min-height: 108px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .kpi .val {
    font-size: 30px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--primary);
  }

  .kpi .lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    background: var(--surface-strong);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 640px;
  }

  th {
    padding: 13px 16px;
    text-align: left;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--muted);
    background: #f7f1e8;
    border-bottom: 1px solid var(--line-strong);
  }

  td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--line);
    color: var(--text);
  }

  tbody tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: rgba(248, 244, 237, 0.65); }
  tr:hover td { background: rgba(223, 236, 232, 0.75); }

  .rate-bar {
    display: grid;
    grid-template-columns: minmax(90px, 1fr) auto;
    align-items: center;
    gap: 10px;
  }

  .bar-wrap {
    background: #e7e0d4;
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--success), #80c48a);
  }

  .bar-pct {
    font-size: 12px;
    color: var(--muted);
    min-width: 48px;
    text-align: right;
  }

  a.link,
  a.back {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
  }

  a.link:hover,
  a.back:hover {
    color: var(--accent);
  }

  a.back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255, 252, 247, 0.76);
    border: 1px solid var(--line);
  }

  .r { text-align: right; }

  td.empty-row {
    text-align: center;
    color: var(--muted);
    padding: 24px 16px;
  }

  @media (max-width: 768px) {
    .page { padding: 20px 14px 40px; }
    .header { padding: 24px 20px; border-radius: 20px; }
    .header h1 { font-size: 24px; }
    .card { padding: 18px 16px; }
    .kpi-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .kpi { min-height: 96px; }
    .kpi .val { font-size: 24px; }
  }

  @media (max-width: 520px) {
    .kpi-row { grid-template-columns: 1fr; }
    .rate-bar { grid-template-columns: 1fr; }
    .bar-pct { text-align: left; }
  }
</style>
</head>
<body>
<div class="page">
{% block content %}{% endblock %}
</div>
</body>
</html>
