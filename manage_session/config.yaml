# manage_session 配置文件

# 目录配置
dirs:
  tasks: data/tasks               # 任务文件目录
  raw_index: data/raw_index       # 原始 index 文件目录
  manifests: output/manifests     # 清单目录（自动维护）
  pair_cache: output/pair_cache   # 匹配缓存目录（自动维护）
  views: output/views             # 视图输出目录（自动生成）

# Web UI 配置
web:
  host: 127.0.0.1
  port: 8081

# 匹配配置
matching:
  # 匹配字段：task 中的字段名 vs index 中的查询字段
  task_query_field: query         # task 中的查询字段
  index_query_field: q1           # index 中的查询字段
  match_type: exact               # exact 或 fuzzy（当前仅支持 exact）
